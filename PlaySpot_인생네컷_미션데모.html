<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E0F14">
<title>PlaySpot · 스폿컷 (인생네컷) 미션 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Gowun+Batang:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0E0F14;--bg1:rgba(255,255,255,.06);--bg2:rgba(255,255,255,.1);
  --accent:#FF8A3D;--accent2:#FFB877;--gold:#E8C063;--rose:#FF6B9D;--green:#34D399;--blue:#5BB0E8;--purple:#B388FF;
  --txt1:#F7F4EF;--txt2:#AAB0C0;--txt3:#6B7283;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --hanok:#8B3A3A;--hanok2:#C49A4A;
}
body{font-family:'Outfit','Noto Sans KR',-apple-system,system-ui,sans-serif;background:#1a1b22;color:var(--txt1);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg0);position:relative;display:flex;flex-direction:column;overflow:hidden}
.hd{flex-shrink:0;padding:14px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(14,15,20,.9);backdrop-filter:blur(12px);z-index:10}
.hd-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--accent));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.hd-av .pl{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--rose);opacity:0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.hd-who b{font-size:14px;font-weight:800;display:block;line-height:1.2}
.hd-who span{font-size:11px;color:var(--txt3)}
.hd-prog{margin-left:auto;display:flex;gap:4px}
.hd-prog i{width:7px;height:7px;border-radius:50%;background:var(--bg2)}
.hd-prog i.on{background:var(--accent)}
.stage{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sys{align-self:center;font-size:11px;color:var(--txt3);background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600}
.bot{max-width:86%;align-self:flex-start;opacity:0;transform:translateY(8px);animation:fade .35s ease forwards}
.bot .b{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:12px 16px;font-size:15px;line-height:1.55;font-weight:500}
.me{max-width:86%;align-self:flex-end;opacity:0;transform:translateY(8px);animation:fade .3s ease forwards}
.me .b{background:linear-gradient(135deg,var(--rose),var(--accent));color:#2a1205;border-radius:18px;border-bottom-right-radius:5px;padding:11px 16px;font-size:14px;font-weight:700}
@keyframes fade{to{opacity:1;transform:translateY(0)}}
.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:13px 17px;display:inline-flex;gap:5px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.goal{align-self:stretch;background:linear-gradient(135deg,rgba(255,107,157,.16),rgba(255,138,61,.08));border:1px solid rgba(255,107,157,.35);border-radius:18px;padding:15px 16px;opacity:0;transform:translateY(8px);animation:fade .4s ease forwards}
.goal .tg{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--rose);margin-bottom:6px}
.goal b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.goal p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* camera */
.cam{align-self:stretch;border-radius:22px;overflow:hidden;position:relative;background:#000;aspect-ratio:1;border:1px solid var(--border2);opacity:0;animation:fade .4s ease forwards}
.cam img{width:100%;height:100%;object-fit:cover}
.cam .frame{position:absolute;inset:14px;border:2px solid rgba(255,255,255,.45);border-radius:14px;pointer-events:none}
.cam .topbar{position:absolute;top:0;left:0;right:0;padding:11px 15px;display:flex;align-items:center;gap:8px;background:linear-gradient(rgba(0,0,0,.55),transparent);z-index:2}
.cam .topbar .dot{width:8px;height:8px;border-radius:50%;background:#FF5252}
.cam .topbar span{font-size:11px;font-weight:700;color:#fff}
.cam .pose{position:absolute;left:12px;right:12px;bottom:14px;text-align:center;font-size:13px;color:#fff;font-weight:700;text-shadow:0 1px 8px rgba(0,0,0,.8);z-index:2}
.cam .count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;font-weight:800;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.6);z-index:3;font-family:'Outfit'}
.cam .cutmark{position:absolute;top:11px;right:14px;background:rgba(255,107,157,.95);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;z-index:3}
.cam.flash::after{content:'';position:absolute;inset:0;background:#fff;animation:fl .5s ease;z-index:5}
@keyframes fl{0%{opacity:.95}100%{opacity:0}}
/* thumbnails row during shooting */
.thumbs{display:flex;gap:7px;align-self:center}
.thumb{width:48px;height:48px;border-radius:8px;background:var(--bg2);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt3);font-weight:800}
.thumb img{width:100%;height:100%;object-fit:cover}
/* four-cut result strip */
.strip-wrap{align-self:center;opacity:0;animation:fade .5s ease forwards}
.booth{display:block;width:212px;border-radius:12px;box-shadow:0 16px 44px rgba(0,0,0,.55);background:#fff}
.strip{width:200px;background:linear-gradient(160deg,#fdf6e9,#f5e6c8);border-radius:10px;padding:12px 12px 36px;box-shadow:0 16px 40px rgba(0,0,0,.5);position:relative;border:1px solid rgba(196,154,74,.4)}
.strip .ftop{text-align:center;font-family:'Gowun Batang',serif;font-size:13px;font-weight:700;color:var(--hanok);margin-bottom:9px;letter-spacing:.04em}
.strip .grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.strip .grid .c{aspect-ratio:1;border-radius:5px;overflow:hidden;border:1.5px solid #fff;box-shadow:0 1px 4px rgba(139,58,58,.25)}
.strip .grid .c img{width:100%;height:100%;object-fit:cover}
.strip .fbot{position:absolute;left:0;right:0;bottom:9px;text-align:center;font-size:9px;font-weight:700;color:var(--hanok2);letter-spacing:.08em}
.strip .seal{position:absolute;right:8px;bottom:22px;width:34px;height:34px;border-radius:50%;background:var(--hanok);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Gowun Batang',serif;font-size:9px;font-weight:700;line-height:1.1;text-align:center;transform:rotate(-8deg);box-shadow:0 2px 6px rgba(0,0,0,.3)}
/* frame picker */
.frames{display:grid;grid-template-columns:1fr 1fr;gap:9px;align-self:stretch}
.fr{border-radius:14px;padding:12px;cursor:pointer;border:2px solid var(--border);background:var(--bg1);transition:.15s;text-align:center}
.fr:active{transform:scale(.97)}
.fr.sel{border-color:var(--rose)}
.fr .sw{height:42px;border-radius:8px;margin-bottom:8px}
.fr b{font-size:12.5px;font-weight:800;display:block}
.fr span{font-size:10.5px;color:var(--txt3)}
.fr .lock{font-size:10px;color:var(--txt3);margin-top:3px}
/* collection */
.coll{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:18px;padding:16px;opacity:0;animation:fade .5s ease forwards}
.coll-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.coll-hd b{font-size:14px;font-weight:800}
.coll-hd span{font-size:12px;color:var(--accent2);font-weight:700}
.coll-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.coll-cell{aspect-ratio:.72;border-radius:9px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--bg2);font-size:9px;color:var(--txt3);font-weight:700;text-align:center;padding:4px;position:relative;overflow:hidden}
.coll-cell.got{border-color:var(--rose)}
.coll-cell .ic{font-size:17px}
.coll-cell.got .ic{filter:none}
.coll-cell.locked .ic{filter:grayscale(1);opacity:.4}
.coll-cell .new{position:absolute;top:3px;right:3px;background:var(--rose);color:#fff;font-size:7px;font-weight:800;padding:1px 4px;border-radius:8px}
.proc{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:18px;opacity:0;animation:fade .4s ease forwards}
.proc-hd{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.proc-spin{width:38px;height:38px;border-radius:50%;border:3px solid var(--bg2);border-top-color:var(--rose);animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-hd b{font-size:14px;font-weight:800;display:block}.proc-hd span{font-size:11.5px;color:var(--txt3)}
.proc-bar{height:6px;background:var(--bg2);border-radius:4px;overflow:hidden}
.proc-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--gold));border-radius:4px;transition:width .5s ease}
.act{flex-shrink:0;padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;flex-direction:column;gap:9px;background:rgba(14,15,20,.9);backdrop-filter:blur(12px)}
.btn{width:100%;border:none;border-radius:15px;font-family:inherit;font-size:15px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.pri{background:linear-gradient(135deg,var(--rose),var(--accent));color:#2a1205}
.btn.grn{background:linear-gradient(135deg,var(--green),#22b88a);color:#04241c}
.btn.gold{background:linear-gradient(135deg,var(--gold),#d4a93c);color:#2a2200}
.btn.ghost{background:var(--bg2);color:var(--txt1);border:1px solid var(--border2);font-weight:700;font-size:13.5px;padding:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px}.row .btn{flex:1}
.cap{font-size:11px;color:var(--txt3);text-align:center;font-weight:600}
.reward{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--gold);opacity:0;animation:fade .5s ease forwards}
.reward .tp{height:74px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,rgba(232,192,99,.2),rgba(255,107,157,.06))}
.reward .bd{background:var(--bg1);padding:13px 16px;text-align:center}
.reward .bd h4{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:4px}
.reward .bd p{font-size:12.5px;color:var(--txt2);line-height:1.5}
</style>
</head>
<body>
<div class="phone">
  <div class="hd">
    <div class="hd-av"><span class="pl"></span>📸</div>
    <div class="hd-who"><b>소라 · 가이드</b><span id="hd-state">북촌 한옥마을 · 도착</span></div>
    <div class="hd-prog" id="hd-prog"><i class="on"></i><i></i><i></i><i></i></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="act" id="act"></div>
</div>

var POSES=["1컷 · 정면 미소 😊","2컷 · 살짝 옆모습 😌","3컷 · 점프 또는 브이 ✌️","4컷 · 자유 포즈 🤳"];
var stage=document.getElementById('stage'),act=document.getElementById('act');
var pickedFrame='hanok';
function setState(t){document.getElementById('hd-state').textContent=t;}
function setProg(n){document.querySelectorAll('#hd-prog i').forEach(function(x,i){x.classList.toggle('on',i<n);});}
function down(){stage.scrollTop=stage.scrollHeight;}
function sys(t){var d=document.createElement('div');d.className='sys';d.textContent=t;stage.appendChild(d);down();}
function me(t){var d=document.createElement('div');d.className='me';d.innerHTML='<div class="b">'+t+'</div>';stage.appendChild(d);down();}
function clearAct(){act.innerHTML='';}
function btn(html,cls,fn){var b=document.createElement('button');b.className='btn '+(cls||'');b.innerHTML=html;b.onclick=fn;act.appendChild(b);return b;}
function cap(t){var p=document.createElement('div');p.className='cap';p.textContent=t;act.appendChild(p);return p;}
function botSeq(msgs,cb){var i=0;(function step(){if(i>=msgs.length){if(cb)cb();return;}var tp=document.createElement('div');tp.className='typing';tp.innerHTML='<i></i><i></i><i></i>';stage.appendChild(tp);down();var delay=Math.min(900,400+msgs[i].length*24);setTimeout(function(){if(tp.parentNode)stage.removeChild(tp);var d=document.createElement('div');d.className='bot';d.innerHTML='<div class="b">'+msgs[i]+'</div>';stage.appendChild(d);down();i++;setTimeout(step,250);},delay);})();}

/* STEP 1 — brief */
function start(){
  stage.innerHTML='';clearAct();setProg(1);setState('북촌 한옥마을 · 도착');pickedFrame='hanok';
  sys('📡 도착 감지 · 북촌 한옥마을');
  botSeq([
    '여기 진짜 사진 맛집이야 📸 그냥 찍기 아깝지!',
    '오늘 미션은 <b style="color:var(--accent2)">스폿컷</b> — 북촌에서만 받을 수 있는 <b>한정 프레임</b>으로 인생네컷을 만들 거야 🖼️'
  ],function(){
    var g=document.createElement('div');g.className='goal';
    g.innerHTML='<div class="tg">🖼️ 시그니처 미션 · 스폿컷</div><b>북촌 한정 프레임으로 인생네컷</b><p>컷마다 직접 찍어 4컷을 모으면 그 스폿만의 전통 프레임으로 합성해줄게. 스폿마다 프레임이 달라서 — 다 모으면 컬렉션 완성! 🏆</p>';
    stage.appendChild(g);down();
    clearAct();
    btn('🖼️ 프레임 고르기','pri',pickFrame);
  });
}

/* STEP 2 — frame pick */
function pickFrame(){
  stage.innerHTML='';clearAct();setProg(2);setState('프레임 선택');
  sys('🖼️ 북촌 한정 프레임');
  botSeq(['북촌에서 풀린 프레임이야. 마음에 드는 걸로 골라봐 (다른 스폿엔 또 다른 프레임이 있어 😏)'],function(){
    var wrap=document.createElement('div');wrap.className='frames';
    var frames=[
      {id:'hanok',sw:'linear-gradient(160deg,#fdf6e9,#f5e6c8)',name:'단청 한지',sub:'전통 자개·한지 질감',lock:''},
      {id:'gold',sw:'linear-gradient(160deg,#2a2118,#4a3a22)',name:'먹빛 금박',sub:'블랙 + 금박 라인',lock:''},
      {id:'seasonal',sw:'linear-gradient(160deg,#ffd9e6,#ffc2d6)',name:'봄 벚꽃 ✨',sub:'시즌 한정 · 4월까지',lock:'⏳ 시즌 한정'},
      {id:'duo',sw:'linear-gradient(160deg,#dbeafe,#bfdbfe)',name:'듀오 프레임 🔒',sub:'2명 이상 함께 찍으면',lock:'🔒 친구 합류 시'}
    ];
    frames.forEach(function(f){
      var el=document.createElement('div');el.className='fr'+(f.id==='hanok'?' sel':'');el.dataset.id=f.id;
      el.innerHTML='<div class="sw" style="background:'+f.sw+'"></div><b>'+f.name+'</b><span>'+f.sub+'</span>'+(f.lock?'<div class="lock">'+f.lock+'</div>':'');
      if(f.id==='seasonal'||f.id==='duo'){el.style.opacity='.55';}
      el.onclick=function(){
        if(f.id==='duo'){me('듀오 프레임은?');botSeq(['친구랑 같이 찍으면 열려! 둘 다 보너스 포인트도 받고 😎 오늘은 혼자니까 다른 걸로 갈까?']);return;}
        if(f.id==='seasonal'){me('봄 벚꽃!');botSeq(['오 센스 👍 벚꽃 프레임은 4월까지만 풀려. 지금 안 찍으면 내년이야 🌸']);}
        wrap.querySelectorAll('.fr').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');pickedFrame=f.id;
      };
      wrap.appendChild(el);
    });
    stage.appendChild(wrap);down();
    clearAct();
    btn('📸 이 프레임으로 촬영 시작','pri',shoot);
    cap('컷마다 직접 찍어요 · 컷별로 포즈가 바뀌어요');
  });
}

/* STEP 3 — shoot 4 cuts */
function shoot(){
  stage.innerHTML='';clearAct();setProg(3);setState('네컷 촬영 중…');
  sys('📸 인생네컷 촬영');
  var cam=document.createElement('div');cam.className='cam';
  cam.innerHTML='<div class="topbar"><span class="dot"></span><span>LIVE · 네컷 모드</span></div>'+
    '<div class="cutmark" id="cutmark">CUT 1 / 4</div>'+
    '<img id="cam-img" src="'+CUTS[0]+'">'+
    '<div class="frame"></div>'+
    '<div class="pose" id="pose">'+POSES[0]+'</div>'+
    '<div class="count" id="count" style="display:none"></div>';
  stage.appendChild(cam);down();
  var thumbs=document.createElement('div');thumbs.className='thumbs';thumbs.id='thumbs';
  for(var i=0;i<4;i++){var t=document.createElement('div');t.className='thumb';t.textContent=(i+1);thumbs.appendChild(t);}
  stage.appendChild(thumbs);down();
  var idx=0;
  function arm(){
    document.getElementById('cutmark').textContent='CUT '+(idx+1)+' / 4';
    document.getElementById('pose').textContent=POSES[idx];
    document.getElementById('cam-img').src=CUTS[idx];
    clearAct();
    var b=btn('📸 '+(idx+1)+'컷 찍기','pri',function(){doShoot(b);});
    cap('포즈 잡고 버튼을 누르면 3·2·1 카운트다운 후 찰칵!');
  }
  function doShoot(b){
    b.disabled=true;
    var c=document.getElementById('count');c.style.display='flex';
    var n=3;c.textContent=n;
    var iv=setInterval(function(){
      n--;
      if(n>0){c.textContent=n;}
      else{
        clearInterval(iv);c.style.display='none';
        cam.classList.add('flash');
        setTimeout(function(){cam.classList.remove('flash');},500);
        var th=document.querySelectorAll('#thumbs .thumb')[idx];
        th.innerHTML='<img src="'+CUTS[idx]+'">';
        idx++;
        if(idx<4){setTimeout(arm,500);}
        else{clearAct();setTimeout(function(){me('찰칵 ×4 📸');composite();},600);}
      }
    },650);
  }
  arm();
}

/* STEP 3.5 — composite */
function composite(){
  botSeq(['좋았어! 이제 북촌 한정 프레임으로 합성 중… ✨'],function(){
    var card=document.createElement('div');card.className='proc';
    card.innerHTML='<div class="proc-hd"><div class="proc-spin"></div><div><b>스폿컷 합성 중…</b><span>4컷 → 북촌 한정 프레임</span></div></div><div class="proc-bar"><i id="pbar"></i></div>';
    stage.appendChild(card);down();
    var bar=document.getElementById('pbar');var p=0;
    var iv=setInterval(function(){p+=25;bar.style.width=p+'%';if(p>=100){clearInterval(iv);setTimeout(showResult,500);}},450);
  });
}

/* STEP 4 — result + collection */
function showResult(){
  stage.innerHTML='';clearAct();setProg(4);setState('완성! 🖼️');
  sys('🖼️ 스폿컷 완성');
  botSeq(['짠 — 북촌 스폿컷 완성! 🎉'],function(){
    var wrap=document.createElement('div');wrap.className='strip-wrap';
    wrap.innerHTML='<img class="booth" src="'+BOOTH+'">';
    stage.appendChild(wrap);down();
    setTimeout(function(){
      botSeq(['이건 북촌에서만 나오는 프레임이야 😎 이제 컬렉션에 한 칸 채워졌어 👇'],function(){
        var coll=document.createElement('div');coll.className='coll';
        coll.innerHTML='<div class="coll-hd"><b>🗂 서울 스폿컷 컬렉션</b><span>1 / 6 수집</span></div>';
        var grid=document.createElement('div');grid.className='coll-grid';
        var cells=[
          {n:'북촌',ic:'🏯',got:true,nw:true},{n:'성수',ic:'🛹',got:false},{n:'명동',ic:'💿',got:false},
          {n:'한강',ic:'🌉',got:false},{n:'을지로',ic:'🍺',got:false},{n:'경복궁',ic:'👑',got:false}
        ];
        cells.forEach(function(c){
          var el=document.createElement('div');el.className='coll-cell '+(c.got?'got':'locked');
          el.innerHTML=(c.nw?'<span class="new">NEW</span>':'')+'<span class="ic">'+c.ic+'</span>'+c.n+(c.got?'':'<div style="font-size:8px">🔒</div>');
          grid.appendChild(el);
        });
        coll.appendChild(grid);stage.appendChild(coll);down();
        setTimeout(function(){
          var r=document.createElement('div');r.className='reward';
          r.innerHTML='<div class="tp">🏆</div><div class="bd"><h4>북촌 스폿컷 획득!</h4><p>+120 포인트 · 6개 다 모으면 한정 굿즈 교환권 🎁</p></div>';
          stage.appendChild(r);down();
          clearAct();
          btn('📲 저장하고 공유하기','gold',function(){me('공유했어! 📲');this.disabled=true;botSeq(['친구가 "이 프레임 어디서 받아?" 물어보면 — 북촌 와야 받는다고 해 😏']);});
          var row=document.createElement('div');row.className='row';act.appendChild(row);
          var b1=document.createElement('button');b1.className='btn grn';b1.innerHTML='🖨 실물 포카 출력';b1.onclick=function(){me('실물로 뽑기!');botSeq(['오 좋지! 근처 제휴 무인 출력소에서 이 네컷을 실물 포토카드로 뽑을 수 있어 🎞 위치 보여줄게.']);};row.appendChild(b1);
          var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='↻ 다시';b2.onclick=start;row.appendChild(b2);
        },900);
      });
    },1000);
  });
}

start();
</script>
