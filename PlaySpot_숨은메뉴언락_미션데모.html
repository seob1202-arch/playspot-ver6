<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E0F14">
<title>PlaySpot · 외국인 전용 숨은 메뉴 (간판 스캔) 미션 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Black+Han+Sans&family=Gaegu:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#12100C;--bg1:rgba(255,255,255,.06);--bg2:rgba(255,255,255,.1);
  --accent:#FF8A3D;--accent2:#FFB877;--gold:#F5C84A;--red:#E0524B;--green:#34D399;--jade:#3E9C7C;
  --txt1:#F4ECDD;--txt2:#B8AE9C;--txt3:#7A7164;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
}
body{font-family:'Outfit','Noto Sans KR',-apple-system,system-ui,sans-serif;background:#1a1714;color:var(--txt1);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg0);position:relative;display:flex;flex-direction:column;overflow:hidden;background-image:radial-gradient(circle at 50% 0%,rgba(255,138,61,.1),transparent 55%)}
.hd{flex-shrink:0;padding:14px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(18,16,12,.92);backdrop-filter:blur(12px);z-index:10}
.hd-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--red));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.hd-av .pl{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.hd-who b{font-size:14px;font-weight:800;display:block;line-height:1.2}
.hd-who span{font-size:11px;color:var(--txt3)}
.hd-prog{margin-left:auto;display:flex;gap:4px}
.hd-prog i{width:7px;height:7px;border-radius:50%;background:var(--bg2)}.hd-prog i.on{background:var(--accent)}
.stage{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sys{align-self:center;font-size:11px;color:var(--txt3);background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600}
.bot{max-width:86%;align-self:flex-start;opacity:0;transform:translateY(8px);animation:fade .35s ease forwards}
.bot .b{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:12px 16px;font-size:15px;line-height:1.55;font-weight:500}
.me{max-width:86%;align-self:flex-end;opacity:0;transform:translateY(8px);animation:fade .3s ease forwards}
.me .b{background:linear-gradient(135deg,var(--accent),var(--red));color:#2a1205;border-radius:18px;border-bottom-right-radius:5px;padding:11px 16px;font-size:14px;font-weight:700}
@keyframes fade{to{opacity:1;transform:translateY(0)}}
.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:13px 17px;display:inline-flex;gap:5px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.goal{align-self:stretch;background:linear-gradient(135deg,rgba(255,138,61,.16),rgba(224,82,75,.1));border:1px solid rgba(255,138,61,.35);border-radius:18px;padding:15px 16px;opacity:0;transform:translateY(8px);animation:fade .4s ease forwards}
.goal .tg{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--accent2);margin-bottom:6px}
.goal b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.goal p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* signboard scan */
.scan{align-self:stretch;border-radius:20px;overflow:hidden;position:relative;background:#0a0908;border:1px solid var(--border2);opacity:0;animation:fade .4s ease forwards}
.scan .topbar{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;gap:7px;background:linear-gradient(rgba(0,0,0,.6),transparent);z-index:5}
.scan .topbar .dot{width:8px;height:8px;border-radius:50%;background:#FF5252}
.scan .topbar span{font-size:11px;font-weight:700;color:#fff}
/* hanok-style signboard */
.sign-wrap{padding:38px 18px;background:radial-gradient(ellipse at 50% 40%,#2a2018,#14100b);display:flex;align-items:center;justify-content:center;min-height:230px}
.sign{background:linear-gradient(165deg,#3a2416,#27160c);border:5px solid #6b4423;border-radius:8px;padding:20px 30px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.6),inset 0 0 30px rgba(0,0,0,.5);position:relative}
.sign::before{content:'';position:absolute;inset:6px;border:1px solid rgba(201,161,74,.4);border-radius:4px;pointer-events:none}
.sign .since{font-family:'Outfit';font-size:10px;letter-spacing:.2em;color:#c9a14a;margin-bottom:6px}
.sign .nm{font-family:'Black Han Sans','Noto Sans KR';font-size:38px;color:#f0d9a8;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.6);letter-spacing:.02em}
.sign .est{font-family:'Gaegu';font-size:14px;color:#c9a14a;margin-top:8px}
.scanline{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 14px 3px rgba(255,138,61,.6);z-index:4;top:0;display:none}
.scanline.run{display:block;animation:scanmove 2.2s ease-in-out}
@keyframes scanmove{0%{top:6%}100%{top:94%}}
.scan-result{position:absolute;left:0;right:0;bottom:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:4;opacity:0;transition:.4s}
.scan-result.show{opacity:1}
.scan-result .ck{font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px}
.scan-result .lock{font-size:13px;font-weight:800;color:var(--accent2);display:flex;align-items:center;gap:6px}
/* lock reveal */
.lockcard{align-self:stretch;border-radius:20px;overflow:hidden;border:2px dashed var(--accent);background:var(--bg1);padding:26px 18px;text-align:center;opacity:0;animation:fade .4s ease forwards;position:relative}
.lockcard .lk{font-size:48px;display:inline-block;transition:transform .5s,opacity .5s}
.lockcard.opened .lk{transform:scale(1.3) rotate(-12deg);opacity:0}
.lockcard .lktxt{font-size:14px;font-weight:800;color:var(--accent2);margin-top:10px}
.lockcard .lksub{font-size:12px;color:var(--txt3);margin-top:5px}
/* hidden menu card */
.hidden{align-self:stretch;border-radius:20px;overflow:hidden;border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(245,200,74,.15);opacity:0;animation:popin .55s cubic-bezier(.16,1.4,.3,1) forwards;position:relative}
@keyframes popin{0%{opacity:0;transform:scale(.85) rotateX(20deg)}100%{opacity:1;transform:scale(1) rotateX(0)}}
.hidden-img{position:relative;height:185px;overflow:hidden}
.hidden-img img{width:100%;height:100%;object-fit:cover}
.hidden-img .tag{position:absolute;top:12px;left:12px;background:linear-gradient(135deg,#7a3b8e,#5a2b6e);color:#fff;font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.hidden-img .secret{position:absolute;top:12px;right:12px;background:rgba(224,82,75,.95);color:#fff;font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;z-index:2}
.hidden-img .lbl{position:absolute;bottom:0;left:0;right:0;padding:26px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.88));z-index:2}
.hidden-img .lbl .kr{font-size:20px;font-weight:800;color:#fff;line-height:1.25}
.hidden-img .lbl .en{font-size:11.5px;color:rgba(255,255,255,.85);font-weight:600;margin-top:2px}
.hidden-bd{background:var(--bg1);padding:15px 16px}
.hidden-desc{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:12px}
.hidden-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.hidden-meta .m{font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:20px}
.hidden-meta .mild{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.hidden-meta .free{background:rgba(245,200,74,.15);color:var(--gold);border:1px solid rgba(245,200,74,.3)}
.hidden-meta .only{background:rgba(122,59,142,.2);color:#d9a8e8;border:1px solid rgba(122,59,142,.4)}
.scarce{background:rgba(224,82,75,.1);border:1px solid rgba(224,82,75,.25);border-radius:10px;padding:9px 12px;font-size:11.5px;color:#ff9a92;font-weight:600;margin-bottom:12px;text-align:center}
.owner{background:linear-gradient(135deg,rgba(122,59,142,.14),rgba(224,82,75,.06));border:1px solid rgba(122,59,142,.3);border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.owner .face{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#c98a4a,#8a5a2a);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.owner .ot b{font-size:12px;font-weight:800;color:#d9a8e8;display:block;margin-bottom:2px}
.owner .ot p{font-size:12.5px;color:var(--txt1);line-height:1.5}
/* visit pass */
.pass{align-self:stretch;border-radius:18px;overflow:hidden;border:2px solid var(--accent);background:linear-gradient(135deg,rgba(255,138,61,.16),rgba(245,200,74,.06));opacity:0;animation:fade .5s ease forwards;text-align:center;padding:18px 16px;position:relative}
.pass::before,.pass::after{content:'';position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:var(--bg0);transform:translateY(-50%)}
.pass::before{left:-9px}.pass::after{right:-9px}
.pass .pl{font-size:11px;font-weight:800;color:var(--accent2);letter-spacing:.05em;margin-bottom:8px}
.pass .pm{font-size:16px;font-weight:800;margin-bottom:6px}
.pass .pd{font-size:12px;color:var(--txt2);line-height:1.5}
.pass .show-staff{margin-top:11px;font-size:11px;font-weight:700;color:var(--accent);border-top:1px dashed rgba(255,138,61,.3);padding-top:10px}
.pron{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:12px}
.pron .pbtn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--red));border:none;color:#2a1205;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pron .pt b{font-size:13.5px;font-weight:800;display:block}
.pron .pt span{font-size:11px;color:var(--txt3)}
.act{flex-shrink:0;padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;flex-direction:column;gap:9px;background:rgba(18,16,12,.92);backdrop-filter:blur(12px)}
.btn{width:100%;border:none;border-radius:15px;font-family:inherit;font-size:15px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.pri{background:linear-gradient(135deg,var(--accent),var(--red));color:#2a1205}
.btn.grn{background:linear-gradient(135deg,var(--green),#22b88a);color:#04241c}
.btn.gold{background:linear-gradient(135deg,var(--gold),#e0b43c);color:#2a2200}
.btn.purp{background:linear-gradient(135deg,#9a5cae,#6a2b8e);color:#fff}
.btn.ghost{background:var(--bg2);color:var(--txt1);border:1px solid var(--border2);font-weight:700;font-size:13.5px;padding:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px}.row .btn{flex:1}
.cap{font-size:11px;color:var(--txt3);text-align:center;font-weight:600}
.reward{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--gold);opacity:0;animation:fade .5s ease forwards}
.reward .tp{height:70px;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,rgba(245,200,74,.2),rgba(122,59,142,.06))}
.reward .bd{background:var(--bg1);padding:13px 16px;text-align:center}
.reward .bd h4{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:4px}
.reward .bd p{font-size:12.5px;color:var(--txt2);line-height:1.5}
.coll{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:16px;padding:14px;opacity:0;animation:fade .5s ease forwards}
.coll-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.coll-hd b{font-size:13px;font-weight:800}.coll-hd span{font-size:11.5px;color:#d9a8e8;font-weight:700}
.coll-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.coll-cell{aspect-ratio:1;border-radius:10px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--bg2);font-size:9px;color:var(--txt3);font-weight:700;text-align:center;padding:4px;position:relative}
.coll-cell.got{border-color:var(--gold)}
.coll-cell .ic{font-size:18px}
.coll-cell.locked .ic{filter:grayscale(1);opacity:.4}
.coll-cell .new{position:absolute;top:3px;right:3px;background:var(--gold);color:#2a2200;font-size:7px;font-weight:800;padding:1px 4px;border-radius:8px}
.confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:99;pointer-events:none}
</style>
</head>
<body>
<div class="phone">
  <div class="hd">
    <div class="hd-av"><span class="pl"></span>🤫</div>
    <div class="hd-who"><b>소라 · 가이드</b><span id="hd-state">을지칼국수 · 도착</span></div>
    <div class="hd-prog" id="hd-prog"><i class="on"></i><i></i><i></i><i></i></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="act" id="act"></div>
</div>

var stage=document.getElementById('stage'),act=document.getElementById('act');
function setState(t){document.getElementById('hd-state').textContent=t;}
function setProg(n){document.querySelectorAll('#hd-prog i').forEach(function(x,i){x.classList.toggle('on',i<n);});}
function down(){stage.scrollTop=stage.scrollHeight;}
function sys(t){var d=document.createElement('div');d.className='sys';d.textContent=t;stage.appendChild(d);down();}
function me(t){var d=document.createElement('div');d.className='me';d.innerHTML='<div class="b">'+t+'</div>';stage.appendChild(d);down();}
function clearAct(){act.innerHTML='';}
function btn(html,cls,fn){var b=document.createElement('button');b.className='btn '+(cls||'');b.innerHTML=html;b.onclick=fn;act.appendChild(b);return b;}
function cap(t){var p=document.createElement('div');p.className='cap';p.textContent=t;act.appendChild(p);return p;}
function botSeq(msgs,cb){var i=0;(function step(){if(i>=msgs.length){if(cb)cb();return;}var tp=document.createElement('div');tp.className='typing';tp.innerHTML='<i></i><i></i><i></i>';stage.appendChild(tp);down();var delay=Math.min(950,420+msgs[i].length*24);setTimeout(function(){if(tp.parentNode)stage.removeChild(tp);var d=document.createElement('div');d.className='bot';d.innerHTML='<div class="b">'+msgs[i]+'</div>';stage.appendChild(d);down();i++;setTimeout(step,250);},delay);})();}
function speak(t){try{if('speechSynthesis' in window){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='ko-KR';u.rate=.9;window.speechSynthesis.speak(u);}}catch(e){}}

/* STEP 1 — brief */
function start(){
  stage.innerHTML='';clearAct();setProg(1);setState('을지칼국수 · 도착');
  sys('📡 도착 감지 · 을지칼국수 (1968)');
  botSeq([
    '여기 을지칼국수, 1968년부터 한 자리 지킨 노포야 🍜',
    '근데 비밀이 하나 있어 🤫 사장님이 <b style="color:var(--accent2)">외국인 손님한테만</b> 몰래 풀어주는 메뉴가 있대. 메뉴판엔 없어!',
    '간판 한 번 비춰봐 — 네가 외국인인 걸 확인하면 풀어줄게 😎'
  ],function(){
    var g=document.createElement('div');g.className='goal';
    g.innerHTML='<div class="tg">🤫 시그니처 미션 · 숨은 메뉴</div><b>가게 간판을 스캔하세요</b><p>간판을 비추면 외국인 전용 히든 메뉴가 잠금 해제돼요. 메뉴판엔 없는, 너한테만 푸는 메뉴 😏</p>';
    stage.appendChild(g);down();
    clearAct();btn('📷 간판 스캔하기','pri',scan);
  });
}

/* STEP 2 — scan signboard */
function scan(){
  stage.innerHTML='';clearAct();setProg(2);setState('간판 스캔 중…');
  sys('📷 간판 인식');
  var box=document.createElement('div');box.className='scan';
  box.innerHTML='<div class="topbar"><span class="dot"></span><span>SCAN · 간판 인식 중</span></div>'+
    '<div class="scanline" id="scanline"></div>'+
    '<div class="sign-wrap"><div class="sign"><div class="since">SINCE 1968</div><div class="nm">을지칼국수</div><div class="est">을지로 노포</div></div></div>'+
    '<div class="scan-result" id="scanres"><div class="ck">✓ 을지칼국수 확인됨 · 1968년 노포</div><div class="lock">🔒 외국인 전용 히든 메뉴 1개 감지됨…</div></div>';
  stage.appendChild(box);down();
  clearAct();cap('간판을 인식하고 있어요…');
  setTimeout(function(){document.getElementById('scanline').classList.add('run');},300);
  setTimeout(function(){document.getElementById('scanres').classList.add('show');down();},2300);
  setTimeout(function(){
    me('📷 스캔 완료!');
    botSeq(['찾았다! 🔓 사장님이 외국인한테만 푸는 그 메뉴… 지금 풀어줄게!'],function(){
      clearAct();btn('🔓 숨은 메뉴 열어보기','gold',unlock);
    });
  },2800);
}

/* STEP 3 — unlock animation then reveal */
function unlock(){
  setProg(3);setState('잠금 해제 중…');
  var lc=document.createElement('div');lc.className='lockcard';lc.id='lockcard';
  lc.innerHTML='<span class="lk" id="lk">🔒</span><div class="lktxt">외국인 전용 히든 메뉴</div><div class="lksub">메뉴판엔 없는 비밀 메뉴…</div>';
  stage.appendChild(lc);down();clearAct();cap('철컥… 잠금을 푸는 중');
  setTimeout(function(){
    document.getElementById('lk').textContent='🔓';
    lc.classList.add('opened');
    fireConfetti();
    setTimeout(function(){
      if(lc.parentNode)lc.parentNode.removeChild(lc);
      reveal();
    },650);
  },1100);
}

        '<div class="scarce">🔥 오늘 이 골목에서 단 12명에게만 열린 메뉴예요</div>'+
        '<div class="pron"><button class="pbtn" onclick="speak(\'사장님, 외국인 메뉴 주세요\')">🔊</button><div class="pt"><b>"사장님, 외국인 메뉴 주세요!"</b><span>sa-jang-nim, oe-guk-in menu ju-se-yo</span></div></div>'+
        '<div class="owner"><div class="face">👨‍🍳</div><div class="ot"><b>사장님 한마디</b><p>"쉿, 이건 단골이랑 외국인 친구한테만 줘요 😎 맵게는 안 했으니까 걱정 말고 와요"</p></div></div>'+
      '</div>';
    stage.appendChild(h);down();
    clearAct();
    btn('📍 지금 들어가서 먹기','pri',visit);
    cap('이 화면을 사장님께 보여주면 돼요');
  });
}

/* STEP 4 — visit pass + reward */
function visit(){
  setProg(4);setState('입장 패스 발급');
  me('📍 지금 갈게요!');
  botSeq(['좋아! 들어가서 이 화면을 사장님께 보여줘 👇 "외국인 메뉴"라고 하면 바로 알아들으셔 😉'],function(){
    var p=document.createElement('div');p.className='pass';
    p.innerHTML='<div class="pl">🎫 PLAYSPOT 히든 메뉴 패스</div><div class="pm">을지칼국수 · 외국인 전용 메뉴</div><div class="pd">칼국수 곱빼기 + 군만두 서비스<br>순한맛 조절 · 외국인 전용</div><div class="show-staff">📲 입장 시 직원에게 이 화면을 보여주세요</div>';
    stage.appendChild(p);down();
    setTimeout(function(){
      botSeq(['먹고 나서 사진 한 장이면 미션 완료야 📸'],showReward);
    },1100);
  });
}
function showReward(){
  setState('미션 완료! 🍜');
  var r=document.createElement('div');r.className='reward';
  r.innerHTML='<div class="tp">🏆</div><div class="bd"><h4>을지로 시크릿 헌터 배지 획득!</h4><p>+130 포인트 · 숨은 메뉴를 찾아낸 진짜 인싸 😎</p></div>';
  stage.appendChild(r);down();
  // collection hook
  var coll=document.createElement('div');coll.className='coll';
  coll.innerHTML='<div class="coll-hd"><b>🤫 숨은 메뉴 컬렉션</b><span>1 / 3 · VIP 단골까지!</span></div>';
  var grid=document.createElement('div');grid.className='coll-grid';
  var cells=[{n:'을지칼국수',ic:'🍜',got:true,nw:true},{n:'노가리골목',ic:'🍺',got:false},{n:'광장시장',ic:'🥘',got:false}];
  cells.forEach(function(c){var el=document.createElement('div');el.className='coll-cell '+(c.got?'got':'locked');el.innerHTML=(c.nw?'<span class="new">NEW</span>':'')+'<span class="ic">'+c.ic+'</span>'+c.n+(c.got?'':'<div style="font-size:8px">🔒</div>');grid.appendChild(el);});
  coll.appendChild(grid);stage.appendChild(coll);down();
  clearAct();
  btn('📲 공유하고 친구 초대','gold',function(){me('공유했어! 📲');this.disabled=true;botSeq(['"나만 받은 숨은 메뉴" 자랑하면 친구들 부러워할걸? 😏 친구 들어오면 둘 다 보너스 🎁']);});
  var row=document.createElement('div');row.className='row';act.appendChild(row);
  var b1=document.createElement('button');b1.className='btn purp';b1.innerHTML='🗺 다른 숨은 메뉴 찾기';b1.onclick=function(){me('다른 곳도!');botSeq(['노가리 골목에도 숨은 메뉴가 있어 🍺 3개 다 찾으면 VIP 단골 타이틀이야! 안내할게 🗺️']);};row.appendChild(b1);
  var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='↻ 다시';b2.onclick=start;row.appendChild(b2);
}

/* confetti */
function fireConfetti(){
  var colors=['#FF8A3D','#F5C84A','#E0524B','#34D399','#9a5cae'];
  for(var i=0;i<40;i++){(function(){var c=document.createElement('div');c.className='confetti';c.style.left=(Math.random()*100)+'%';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.transform='rotate('+(Math.random()*360)+'deg)';document.body.appendChild(c);var dur=1400+Math.random()*1200,fall=window.innerHeight+40,drift=(Math.random()-.5)*180,st=null;function f(ts){if(!st)st=ts;var p=(ts-st)/dur;if(p>=1){c.remove();return;}c.style.top=(p*fall-10)+'px';c.style.marginLeft=(drift*p)+'px';c.style.opacity=(1-p);requestAnimationFrame(f);}requestAnimationFrame(f);})();}
}

start();
</script>
