<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E0F14">
<title>PlaySpot · 시간여행 변신 (조선) 미션 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Gowun+Batang:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#12100C;--bg1:rgba(255,255,255,.06);--bg2:rgba(255,255,255,.1);
  --accent:#C9A14A;--accent2:#E3C878;--jade:#3E7C6A;--rose:#8E2C42;--green:#34D399;
  --txt1:#F4ECDD;--txt2:#B8AE9C;--txt3:#7A7164;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --ink:#2A2118;
}
body{font-family:'Outfit','Noto Sans KR',-apple-system,system-ui,sans-serif;background:#1a1714;color:var(--txt1);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg0);position:relative;display:flex;flex-direction:column;overflow:hidden;
  background-image:radial-gradient(circle at 50% 0%,rgba(201,161,74,.1),transparent 55%)}
.hd{flex-shrink:0;padding:14px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(18,16,12,.92);backdrop-filter:blur(12px);z-index:10}
.hd-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--rose));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.hd-av .pl{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.hd-who b{font-size:14px;font-weight:800;display:block;line-height:1.2}
.hd-who span{font-size:11px;color:var(--txt3)}
.hd-prog{margin-left:auto;display:flex;gap:4px}
.hd-prog i{width:7px;height:7px;border-radius:50%;background:var(--bg2)}.hd-prog i.on{background:var(--accent)}
.stage{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sys{align-self:center;font-size:11px;color:var(--txt3);background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600}
.bot{max-width:86%;align-self:flex-start;opacity:0;transform:translateY(8px);animation:fade .35s ease forwards}
.bot .b{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:12px 16px;font-size:15px;line-height:1.55;font-weight:500}
.me{max-width:86%;align-self:flex-end;opacity:0;transform:translateY(8px);animation:fade .3s ease forwards}
.me .b{background:linear-gradient(135deg,var(--accent),var(--rose));color:#1a120a;border-radius:18px;border-bottom-right-radius:5px;padding:11px 16px;font-size:14px;font-weight:700}
@keyframes fade{to{opacity:1;transform:translateY(0)}}
.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:13px 17px;display:inline-flex;gap:5px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.goal{align-self:stretch;background:linear-gradient(135deg,rgba(201,161,74,.16),rgba(142,44,66,.1));border:1px solid rgba(201,161,74,.35);border-radius:18px;padding:15px 16px;opacity:0;transform:translateY(8px);animation:fade .4s ease forwards}
.goal .tg{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--accent2);margin-bottom:6px}
.goal b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.goal p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* era picker */
.eras{display:grid;grid-template-columns:1fr 1fr;gap:9px;align-self:stretch}
.era{border-radius:14px;padding:14px 12px;cursor:pointer;border:2px solid var(--border);background:var(--bg1);transition:.15s;text-align:center;position:relative}
.era:active{transform:scale(.97)}.era.sel{border-color:var(--accent)}
.era .em{font-size:30px;margin-bottom:6px}
.era b{font-size:13.5px;font-weight:800;display:block}
.era span{font-size:10.5px;color:var(--txt3)}
.era .lock{position:absolute;top:8px;right:9px;font-size:10px;color:var(--txt3)}
.era.locked{opacity:.5}
/* camera */
.cam{align-self:stretch;border-radius:22px;overflow:hidden;position:relative;background:#000;aspect-ratio:4/5;border:1px solid var(--border2);opacity:0;animation:fade .4s ease forwards}
.cam img{width:100%;height:100%;object-fit:cover}
.cam .frame{position:absolute;inset:14px;border:2px solid rgba(255,255,255,.45);border-radius:14px;pointer-events:none}
.cam .topbar{position:absolute;top:0;left:0;right:0;padding:11px 15px;display:flex;align-items:center;gap:8px;background:linear-gradient(rgba(0,0,0,.55),transparent);z-index:2}
.cam .topbar .dot{width:8px;height:8px;border-radius:50%;background:#FF5252}
.cam .topbar span{font-size:11px;font-weight:700;color:#fff}
.cam .hint{position:absolute;left:12px;right:12px;bottom:14px;text-align:center;font-size:12px;color:#fff;font-weight:600;text-shadow:0 1px 8px rgba(0,0,0,.8)}
.cam.flash::after{content:'';position:absolute;inset:0;background:#fff;animation:fl .5s ease;z-index:5}
@keyframes fl{0%{opacity:.95}100%{opacity:0}}
/* processing */
.proc{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:18px;opacity:0;animation:fade .4s ease forwards}
.proc-hd{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.proc-spin{width:40px;height:40px;border-radius:50%;border:3px solid var(--bg2);border-top-color:var(--accent);animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-hd b{font-size:15px;font-weight:800;display:block}.proc-hd span{font-size:11.5px;color:var(--txt3)}
.proc-step{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13px;color:var(--txt3);font-weight:600;transition:.3s}
.proc-step .ic{width:22px;height:22px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.proc-step.done{color:var(--txt1)}.proc-step.done .ic{background:var(--green);color:#04241c}
.proc-step.active{color:var(--accent2)}.proc-step.active .ic{background:var(--accent);color:#1a120a;animation:bp 1s ease-in-out infinite}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.proc-bar{height:6px;background:var(--bg2);border-radius:4px;overflow:hidden;margin-top:12px}
.proc-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--rose));border-radius:4px;transition:width .4s ease}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:20px;background:var(--bg2);color:var(--txt2);border:1px solid var(--border)}
.chip.h{color:var(--accent2);border-color:rgba(201,161,74,.3);background:rgba(201,161,74,.12)}
/* before/after slider */
.ba{align-self:stretch;position:relative;border-radius:22px;overflow:hidden;aspect-ratio:4/5;border:1px solid var(--accent);box-shadow:0 0 0 4px rgba(201,161,74,.15);opacity:0;animation:fade .5s ease forwards;touch-action:none;user-select:none}
.ba .layer{position:absolute;inset:0}
.ba .layer img,.ba .layer svg{width:100%;height:100%;object-fit:cover;display:block}
.ba .after{z-index:1}
.ba .before{z-index:2;clip-path:inset(0 50% 0 0)}
.ba .lab{position:absolute;top:12px;font-size:10.5px;font-weight:800;padding:4px 11px;border-radius:20px;z-index:4;color:#fff}
.ba .lab.l{left:12px;background:rgba(40,33,24,.8)}
.ba .lab.r{right:12px;background:rgba(201,161,74,.92);color:#1a120a}
.ba .handle{position:absolute;top:0;bottom:0;left:50%;width:3px;background:#fff;z-index:5;box-shadow:0 0 10px rgba(0,0,0,.5);cursor:ew-resize}
.ba .knob{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:42px;height:42px;border-radius:50%;background:#fff;z-index:6;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink);box-shadow:0 2px 10px rgba(0,0,0,.4);cursor:ew-resize}
.ba .swipehint{position:absolute;left:0;right:0;bottom:12px;text-align:center;font-size:11px;color:#fff;font-weight:700;text-shadow:0 1px 6px rgba(0,0,0,.7);z-index:4;animation:hintpulse 2s ease-in-out infinite}
@keyframes hintpulse{0%,100%{opacity:.6}50%{opacity:1}}
.act{flex-shrink:0;padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;flex-direction:column;gap:9px;background:rgba(18,16,12,.92);backdrop-filter:blur(12px)}
.btn{width:100%;border:none;border-radius:15px;font-family:inherit;font-size:15px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.pri{background:linear-gradient(135deg,var(--accent),var(--rose));color:#1a120a}
.btn.grn{background:linear-gradient(135deg,var(--green),#22b88a);color:#04241c}
.btn.gold{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#1a120a}
.btn.ghost{background:var(--bg2);color:var(--txt1);border:1px solid var(--border2);font-weight:700;font-size:13.5px;padding:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px}.row .btn{flex:1}
.cap{font-size:11px;color:var(--txt3);text-align:center;font-weight:600}
.reward{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--accent);opacity:0;animation:fade .5s ease forwards}
.reward .tp{height:74px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,rgba(201,161,74,.2),rgba(142,44,66,.06))}
.reward .bd{background:var(--bg1);padding:13px 16px;text-align:center}
.reward .bd h4{font-size:15px;font-weight:800;color:var(--accent2);margin-bottom:4px}
.reward .bd p{font-size:12.5px;color:var(--txt2);line-height:1.5}
</style>
</head>
<body>
<div class="phone">
  <div class="hd">
    <div class="hd-av"><span class="pl"></span>⏳</div>
    <div class="hd-who"><b>소라 · 가이드</b><span id="hd-state">경복궁 · 도착</span></div>
    <div class="hd-prog" id="hd-prog"><i class="on"></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="act" id="act"></div>
</div>

var stage=document.getElementById('stage'),act=document.getElementById('act');
function setState(t){document.getElementById('hd-state').textContent=t;}
function setProg(n){document.querySelectorAll('#hd-prog i').forEach(function(x,i){x.classList.toggle('on',i<n);});}
function down(){stage.scrollTop=stage.scrollHeight;}
function sys(t){var d=document.createElement('div');d.className='sys';d.textContent=t;stage.appendChild(d);down();}
function me(t){var d=document.createElement('div');d.className='me';d.innerHTML='<div class="b">'+t+'</div>';stage.appendChild(d);down();}
function clearAct(){act.innerHTML='';}
function btn(html,cls,fn){var b=document.createElement('button');b.className='btn '+(cls||'');b.innerHTML=html;b.onclick=fn;act.appendChild(b);return b;}
function cap(t){var p=document.createElement('div');p.className='cap';p.textContent=t;act.appendChild(p);return p;}
function botSeq(msgs,cb){var i=0;(function step(){if(i>=msgs.length){if(cb)cb();return;}var tp=document.createElement('div');tp.className='typing';tp.innerHTML='<i></i><i></i><i></i>';stage.appendChild(tp);down();var delay=Math.min(950,420+msgs[i].length*24);setTimeout(function(){if(tp.parentNode)stage.removeChild(tp);var d=document.createElement('div');d.className='bot';d.innerHTML='<div class="b">'+msgs[i]+'</div>';stage.appendChild(d);down();i++;setTimeout(step,250);},delay);})();}

/* STEP 1 — brief */
function start(){
  stage.innerHTML='';clearAct();setProg(1);setState('경복궁 · 도착');
  sys('📡 도착 감지 · 경복궁');
  botSeq([
    '여긴 조선 왕조 600년의 심장, 경복궁이야 👑',
    '오늘 미션은… 좀 신기해. <b style="color:var(--accent2)">너를 조선시대로 보내줄게</b> ⏳',
    '셀카 한 장이면 — 그 시절 한복 입은 네 모습으로 변신시켜줄 거야. 진짜 같을걸? 😏'
  ],function(){
    var g=document.createElement('div');g.className='goal';
    g.innerHTML='<div class="tg">⏳ 시그니처 미션 · 시간여행</div><b>조선시대로 변신하기</b><p>셀카를 AI가 그 장소의 시대 모습으로 바꿔줘. 현재의 나 ↔ 과거의 나를 나란히 비교하는 게 핵심! 다른 스폿엔 또 다른 시대가 기다려.</p>';
    stage.appendChild(g);down();
    clearAct();btn('⏳ 시대 고르기','pri',pickEra);
  });
}

/* STEP 2 — era pick */
function pickEra(){
  stage.innerHTML='';clearAct();setProg(2);setState('시대 선택');
  sys('⏳ 어느 시대로 갈까?');
  botSeq(['경복궁에선 <b style="color:var(--accent2)">조선시대</b>가 열려 있어. 다른 시대는 그 시대 스폿에 가야 풀려 😉']);
  setTimeout(function(){
    var wrap=document.createElement('div');wrap.className='eras';
    var eras=[
      {id:'joseon',em:'👘',name:'조선시대',sub:'한복 · 사대부/규수',lock:false},
      {id:'modern',em:'🎩',name:'근대 개화기',sub:'모던보이/걸 · 1920s',lock:'익선동'},
      {id:'goryeo',em:'⚜️',name:'고려',sub:'전통 복식',lock:'유적·사찰'},
      {id:'cyber',em:'🌃',name:'미래 한국',sub:'사이버펑크 ✨',lock:'성수·을지로'}
    ];
    eras.forEach(function(e){
      var el=document.createElement('div');el.className='era'+(e.id==='joseon'?' sel':(e.lock?' locked':''));
      el.innerHTML='<div class="em">'+e.em+'</div><b>'+e.name+'</b><span>'+e.sub+'</span>'+(e.lock?'<div class="lock">🔒 '+e.lock+'</div>':'');
      el.onclick=function(){
        if(e.lock){me(e.name+'은?');botSeq(['그건 <b style="color:var(--accent2)">'+e.lock+'</b>에 가야 열려! 거기서 변신하면 또 다른 너를 만날 수 있어 🗺️ 오늘은 조선으로 갈까?']);return;}
        wrap.querySelectorAll('.era').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');
      };
      wrap.appendChild(el);
    });
    stage.appendChild(wrap);down();
    clearAct();btn('📸 조선으로 — 셀카 찍기','pri',openCam);
    cap('지금은 조선시대만 열려 있어요');
  },900);
}

/* STEP 3 — camera */
function openCam(){
  stage.innerHTML='';clearAct();setProg(3);setState('셀카 촬영');
  sys('📸 셀카');
  botSeq(['정면을 보고 한 장 찍어줘 — 표정은 자연스럽게 😊 준비되면 셔터!'],function(){
    var cam=document.createElement('div');cam.className='cam';
    cam.innerHTML='<div class="topbar"><span class="dot"></span><span>LIVE · 셀카 모드</span></div><img src="'+SELFIE+'"><div class="frame"></div><div class="hint">경복궁을 배경으로 — 얼굴을 프레임에 맞춰요</div>';
    stage.appendChild(cam);down();
    clearAct();
    var sh=document.createElement('div');sh.style.cssText='width:74px;height:74px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.4);margin:0 auto;cursor:pointer';sh.onclick=function(){capture(cam);};act.appendChild(sh);
    cap('탭하여 촬영');
  });
}
function capture(cam){
  setState('촬영 완료');me('📸 찰칵!');
  cam.classList.add('flash');setTimeout(function(){cam.classList.remove('flash');},500);
  setTimeout(function(){
    botSeq(['좋아! 이제 시간을 거슬러 올라가볼게… ⏳✨'],process);
  },500);
}

/* STEP 4 — AI time-travel processing */
function process(){
  clearAct();setProg(4);setState('시간여행 중…');
  var card=document.createElement('div');card.className='proc';
  card.innerHTML=''+
    '<div class="proc-hd"><div class="proc-spin"></div><div><b>조선으로 시간여행 중…</b><span>셀카 1장 → 조선시대 변신</span></div></div>'+
    '<div class="proc-step" data-s="0"><span class="ic">1</span>인물 분석 · 얼굴/포즈 인식</div>'+
    '<div class="proc-step" data-s="1"><span class="ic">2</span>조선 의상 매핑 (한복·머리)</div>'+
    '<div class="proc-step" data-s="2"><span class="ic">3</span>시대 배경 합성 (궁궐·세피아)</div>'+
    '<div class="proc-step" data-s="3"><span class="ic">4</span>빈티지 톤 렌더링</div>'+
    '<div class="chips">'+
      '<span class="chip h">👘 봉황 금박 활옷</span>'+
      '<span class="chip h">👑 떨잠·봉황 떨잠 장식</span>'+
      '<span class="chip h">🏯 경복궁 배경</span>'+
      '<span class="chip h">✨ 왕실 예복 디테일</span>'+
    '</div>'+
    '<div class="proc-bar"><i id="pbar"></i></div>';
  stage.appendChild(card);down();clearAct();cap('AI가 당신을 조선으로 보내는 중…');
  var steps=card.querySelectorAll('.proc-step'),bar=document.getElementById('pbar'),i=0;
  function run(){
    if(i>0){steps[i-1].classList.remove('active');steps[i-1].classList.add('done');}
    if(i<steps.length){steps[i].classList.add('active');bar.style.width=Math.round((i+1)/steps.length*100)+'%';i++;setTimeout(run,1150);}
    else{setTimeout(showResult,700);}
  }
  setTimeout(run,500);
}

/* STEP 5 — before/after slider */
function showResult(){
  stage.innerHTML='';clearAct();setProg(5);setState('변신 완료! ⏳');
  sys('⏳ 시간여행 완성');
  botSeq(['짠 — 조선 왕실의 너야 👑 손가락으로 밀어서 비교해봐! 현재 ↔ 과거 👇'],function(){
    var ba=document.createElement('div');ba.className='ba';
    ba.innerHTML=''+
      '<div class="layer after"><img src="'+JOSEON_IMG+'"></div>'+
      '<div class="layer before" id="ba-before"><img src="'+SELFIE+'"></div>'+
      '<div class="lab l">현재</div><div class="lab r">조선 👘</div>'+
      '<div class="handle" id="ba-handle"><div class="knob" id="ba-knob">⇆</div></div>'+
      '<div class="swipehint">← 밀어서 비교하기 →</div>';
    stage.appendChild(ba);down();
    initSlider(ba);
    setTimeout(function(){
      botSeq(['어때? 😏 완전 중전마마 포스인데? ㅋㅋ 이거 인스타 올리면 친구들 난리날걸?'],function(){
        var r=document.createElement('div');r.className='reward';
        r.innerHTML='<div class="tp">🏆</div><div class="bd"><h4>조선 시간여행자 배지 획득!</h4><p>+140 포인트 · 4개 시대 다 모으면 "시대의 증인" 타이틀 🎖️</p></div>';
        stage.appendChild(r);down();clearAct();
        btn('📲 비교 영상으로 저장 & 공유','gold',function(){me('공유했어! 📲');this.disabled=true;botSeq(['좋아! 현재↔과거가 슥 바뀌는 영상으로 저장됐어 🎬 친구가 "나도 해보고싶다" 하면 초대하면 둘 다 보너스 🎁']);});
        var row=document.createElement('div');row.className='row';act.appendChild(row);
        var b1=document.createElement('button');b1.className='btn grn';b1.innerHTML='🗺️ 다른 시대 찾기';b1.onclick=function(){me('다른 시대도!');botSeq(['익선동=근대, 성수=미래… 시대마다 스폿이 달라. 지도에서 보여줄게 🗺️']);};row.appendChild(b1);
        var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='↻ 다시';b2.onclick=start;row.appendChild(b2);
      });
    },1200);
  });
}

/* before/after drag slider */
function initSlider(ba){
  var before=ba.querySelector('#ba-before'),handle=ba.querySelector('#ba-handle');
  var dragging=false;
  function setPos(clientX){
    var r=ba.getBoundingClientRect();
    var p=Math.max(0,Math.min(1,(clientX-r.left)/r.width));
    before.style.clipPath='inset(0 '+((1-p)*100)+'% 0 0)';
    handle.style.left=(p*100)+'%';
    var hint=ba.querySelector('.swipehint');if(hint)hint.style.display='none';
  }
  function down(e){dragging=true;var x=e.touches?e.touches[0].clientX:e.clientX;setPos(x);e.preventDefault();}
  function move(e){if(!dragging)return;var x=e.touches?e.touches[0].clientX:e.clientX;setPos(x);e.preventDefault();}
  function up(){dragging=false;}
  ba.addEventListener('mousedown',down);ba.addEventListener('touchstart',down,{passive:false});
  window.addEventListener('mousemove',move);window.addEventListener('touchmove',move,{passive:false});
  window.addEventListener('mouseup',up);window.addEventListener('touchend',up);
  // gentle auto-demo sweep on first show
  var t=0,dir=1,auto=setInterval(function(){
    if(dragging){clearInterval(auto);return;}
    t+=dir*0.04;if(t>=0.7){dir=-1;}if(t<=0.3){dir=1;}
    var r=ba.getBoundingClientRect();setPos(r.left+r.width*t);
  },60);
  setTimeout(function(){clearInterval(auto);},4200);
}

start();
</script>
