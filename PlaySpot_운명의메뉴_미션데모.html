<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E0F14">
<title>PlaySpot · 운명의 메뉴 (메뉴판 스캔) 미션 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Gaegu:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#12100C;--bg1:rgba(255,255,255,.06);--bg2:rgba(255,255,255,.1);
  --accent:#FF8A3D;--accent2:#FFB877;--gold:#F5C84A;--red:#E0524B;--green:#34D399;--jade:#3E9C7C;
  --txt1:#F4ECDD;--txt2:#B8AE9C;--txt3:#7A7164;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
}
body{font-family:'Outfit','Noto Sans KR',-apple-system,system-ui,sans-serif;background:#1a1714;color:var(--txt1);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg0);position:relative;display:flex;flex-direction:column;overflow:hidden;background-image:radial-gradient(circle at 50% 0%,rgba(255,138,61,.1),transparent 55%)}
.hd{flex-shrink:0;padding:14px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(18,16,12,.92);backdrop-filter:blur(12px);z-index:10}
.hd-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--red));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.hd-av .pl{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.hd-who b{font-size:14px;font-weight:800;display:block;line-height:1.2}
.hd-who span{font-size:11px;color:var(--txt3)}
.hd-prog{margin-left:auto;display:flex;gap:4px}
.hd-prog i{width:7px;height:7px;border-radius:50%;background:var(--bg2)}.hd-prog i.on{background:var(--accent)}
.stage{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sys{align-self:center;font-size:11px;color:var(--txt3);background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600}
.bot{max-width:86%;align-self:flex-start;opacity:0;transform:translateY(8px);animation:fade .35s ease forwards}
.bot .b{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:12px 16px;font-size:15px;line-height:1.55;font-weight:500}
.me{max-width:86%;align-self:flex-end;opacity:0;transform:translateY(8px);animation:fade .3s ease forwards}
.me .b{background:linear-gradient(135deg,var(--accent),var(--red));color:#2a1205;border-radius:18px;border-bottom-right-radius:5px;padding:11px 16px;font-size:14px;font-weight:700}
@keyframes fade{to{opacity:1;transform:translateY(0)}}
.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:13px 17px;display:inline-flex;gap:5px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.goal{align-self:stretch;background:linear-gradient(135deg,rgba(255,138,61,.16),rgba(224,82,75,.1));border:1px solid rgba(255,138,61,.35);border-radius:18px;padding:15px 16px;opacity:0;transform:translateY(8px);animation:fade .4s ease forwards}
.goal .tg{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--accent2);margin-bottom:6px}
.goal b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.goal p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* scan camera with handwritten menu */
.scan{align-self:stretch;border-radius:20px;overflow:hidden;position:relative;background:#000;border:1px solid var(--border2);opacity:0;animation:fade .4s ease forwards}
.scan .topbar{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;gap:7px;background:linear-gradient(rgba(0,0,0,.6),transparent);z-index:5}
.scan .topbar .dot{width:8px;height:8px;border-radius:50%;background:#FF5252}
.scan .topbar span{font-size:11px;font-weight:700;color:#fff}
/* handwritten menu board */
.menu{background:linear-gradient(165deg,#f3e9d2,#e6d6b3);padding:22px 20px;font-family:'Gaegu',cursive;color:#2a1f12;position:relative}
.menu .mt{text-align:center;font-size:22px;font-weight:700;color:#8a2b1f;margin-bottom:3px}
.menu .msub{text-align:center;font-size:12px;color:#7a6a4a;margin-bottom:14px;border-bottom:2px dashed #b89b5e;padding-bottom:12px}
.menu .mi{font-size:18px;padding:6px 2px;position:relative;border-bottom:1px dotted rgba(138,107,58,.25)}
.menu .mi .top{display:flex;justify-content:space-between;align-items:center}
.menu .mi .kr{font-weight:700}
.menu .mi .pr{color:#5a4a2a}
.menu .mi .en{display:block;font-family:'Outfit';font-size:11px;color:#3a7a5a;font-weight:600;max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .3s ease,margin .3s ease}
.menu .mi.ok .en{max-height:20px;opacity:1;margin-top:2px}
.menu .mi .chk{margin-left:6px;color:#2e9c6e;font-size:13px;opacity:0;transition:opacity .3s}
.menu .mi.ok .chk{opacity:1}
.menu .foot{margin-top:14px;border-top:2px dashed #b89b5e;padding-top:10px;font-size:13px;color:#7a6a4a;text-align:center}
.scanline{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 14px 3px rgba(255,138,61,.6);z-index:4;top:0;display:none}
.scanline.run{display:block;animation:scanmove 2.6s ease-in-out}
@keyframes scanmove{0%{top:8%}100%{top:92%}}
/* roulette */
.roul{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:18px 16px;opacity:0;animation:fade .4s ease forwards;text-align:center}
.roul .rt{font-size:13px;font-weight:800;color:var(--accent2);margin-bottom:4px}
.roul .rq{font-size:15px;font-weight:800;margin-bottom:14px}
.roul-win{position:relative;height:60px;overflow:hidden;border-radius:12px;border:2px solid var(--accent);background:#1a1612}
.roul-win::before,.roul-win::after{content:'';position:absolute;left:0;right:0;height:18px;z-index:2;pointer-events:none}
.roul-win::before{top:0;background:linear-gradient(#1a1612,transparent)}
.roul-win::after{bottom:0;background:linear-gradient(transparent,#1a1612)}
.roul-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:3;color:var(--accent);font-size:20px}
.roul-list{position:absolute;left:0;right:0;top:0;transition:transform .1s linear}
.roul-item{height:60px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;gap:8px}
.roul-item .em{font-size:22px}
.spin-btn{margin-top:14px}
/* winner card */
.win{align-self:stretch;border-radius:20px;overflow:hidden;border:2px solid var(--gold);box-shadow:0 0 0 4px rgba(245,200,74,.15);opacity:0;animation:popin .5s cubic-bezier(.16,1.4,.3,1) forwards;position:relative}
@keyframes popin{0%{opacity:0;transform:scale(.85)}100%{opacity:1;transform:scale(1)}}
.win-img{position:relative;height:170px;overflow:hidden}
.win-img img{width:100%;height:100%;object-fit:cover}
.win-img .tag{position:absolute;top:12px;left:12px;background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.win-img .winlabel{position:absolute;bottom:0;left:0;right:0;padding:24px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.85));z-index:2}
.win-img .winlabel .kr{font-size:21px;font-weight:800;color:#fff}
.win-img .winlabel .en{font-size:12px;color:rgba(255,255,255,.85);font-weight:600}
.win-bd{background:var(--bg1);padding:15px 16px}
.win-desc{font-size:13px;color:var(--txt2);line-height:1.55;margin-bottom:12px}
.win-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.win-meta .m{font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:20px}
.win-meta .spice{background:rgba(224,82,75,.15);color:#ff8a82;border:1px solid rgba(224,82,75,.3)}
.win-meta .rank{background:rgba(245,200,74,.15);color:var(--gold);border:1px solid rgba(245,200,74,.3)}
.win-meta .disc{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.pron{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-bottom:12px}
.pron .pbtn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--red));border:none;color:#2a1205;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pron .pt b{font-size:14px;font-weight:800;display:block}
.pron .pt span{font-size:11.5px;color:var(--txt3)}
.owner{background:linear-gradient(135deg,rgba(255,138,61,.12),rgba(224,82,75,.06));border:1px solid rgba(255,138,61,.25);border-radius:14px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.owner .face{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#c98a4a,#8a5a2a);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.owner .ot b{font-size:12px;font-weight:800;color:var(--accent2);display:block;margin-bottom:2px}
.owner .ot p{font-size:12.5px;color:var(--txt1);line-height:1.5}
.act{flex-shrink:0;padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;flex-direction:column;gap:9px;background:rgba(18,16,12,.92);backdrop-filter:blur(12px)}
.btn{width:100%;border:none;border-radius:15px;font-family:inherit;font-size:15px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.pri{background:linear-gradient(135deg,var(--accent),var(--red));color:#2a1205}
.btn.grn{background:linear-gradient(135deg,var(--green),#22b88a);color:#04241c}
.btn.gold{background:linear-gradient(135deg,var(--gold),#e0b43c);color:#2a2200}
.btn.ghost{background:var(--bg2);color:var(--txt1);border:1px solid var(--border2);font-weight:700;font-size:13.5px;padding:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px}.row .btn{flex:1}
.cap{font-size:11px;color:var(--txt3);text-align:center;font-weight:600}
.reward{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--gold);opacity:0;animation:fade .5s ease forwards}
.reward .tp{height:70px;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,rgba(245,200,74,.2),rgba(255,138,61,.06))}
.reward .bd{background:var(--bg1);padding:13px 16px;text-align:center}
.reward .bd h4{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:4px}
.reward .bd p{font-size:12.5px;color:var(--txt2);line-height:1.5}
.confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:99;pointer-events:none}
</style>
</head>
<body>
<div class="phone">
  <div class="hd">
    <div class="hd-av"><span class="pl"></span>🍜</div>
    <div class="hd-who"><b>소라 · 가이드</b><span id="hd-state">을지칼국수 · 도착</span></div>
    <div class="hd-prog" id="hd-prog"><i class="on"></i><i></i><i></i><i></i></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="act" id="act"></div>
</div>

    '<div class="scanline" id="scanline"></div>'+
    '<div class="menu"><div class="mt">을지칼국수</div><div class="msub">since 1968 · 을지로 노포</div>'+rows+
    '<div class="foot">공기밥 추가 1,000 · 막걸리 4,000</div></div>';
  stage.appendChild(box);down();
  clearAct();cap('한글 메뉴를 인식하고 있어요…');
  setTimeout(function(){document.getElementById('scanline').classList.add('run');},300);
  // reveal translations one by one
  var items=box.querySelectorAll('.mi');
  items.forEach(function(it,k){setTimeout(function(){it.classList.add('ok');down();},700+k*330);});
  setTimeout(function(){
    me('📷 스캔 완료!');
    botSeq(['6개 메뉴 다 읽었어! ✅ 이제 — 오늘 너의 운명의 메뉴를 뽑아볼까? 🎰'],function(){
      clearAct();btn('🎰 운명의 메뉴 돌리기','gold',roulette);
    });
  },700+items.length*330+700);
}

/* STEP 3 — roulette */
function roulette(){
  setProg(3);setState('운명의 메뉴 룰렛 🎰');
  var r=document.createElement('div');r.className='roul';
  // build a long list ending on WIN
  var seq=[];for(var i=0;i<14;i++){seq.push(MENU[i%MENU.length]);}
  // ensure final visible item is WIN
  seq.push(WIN);seq.push(WIN);
  var listHtml=seq.map(function(m){return '<div class="roul-item"><span class="em">'+m.em+'</span>'+m.kr+'</div>';}).join('');
  r.innerHTML='<div class="rt">🎰 운명의 메뉴</div><div class="rq">두구두구… 오늘 당신의 메뉴는?</div>'+
    '<div class="roul-win"><div class="roul-arrow">◀</div><div class="roul-list" id="rlist">'+listHtml+'</div></div>';
  stage.appendChild(r);down();clearAct();cap('룰렛이 돌아갑니다…');
  var list=document.getElementById('rlist');
  var itemH=60;var total=seq.length;
  var finalIdx=total-2; // land on the WIN (second to last)
  var target=finalIdx*itemH;
  // animate via requestAnimationFrame easing
  var startT=null,dur=2800,startPos=0;
  function ease(t){return 1-Math.pow(1-t,3);}
  function frame(ts){
    if(!startT)startT=ts;
    var p=Math.min(1,(ts-startT)/dur);
    var pos=startPos+(target-startPos)*ease(p);
    list.style.transform='translateY('+(-pos)+'px)';
    if(p<1){requestAnimationFrame(frame);}
    else{landWin();}
  }
  setTimeout(function(){requestAnimationFrame(frame);},400);
}
function landWin(){
  // little settle bounce
  fireConfetti();
  setTimeout(function(){
    me('🎰 '+WIN.kr+' 당첨!');
    showWinner();
  },600);
}

/* STEP 4 — winner card */
function showWinner(){
  setProg(4);setState('당첨! '+WIN.kr);
  botSeq(['🎉 <b style="color:var(--gold)">'+WIN.kr+'</b> 당첨! 근데 이거… 우연이 아니야 😏 사장님이 제일 자신있어 하는 메뉴거든.'],function(){
    var w=document.createElement('div');w.className='win';
    w.innerHTML=''+
      '<div class="win-img"><div class="tag">🔥 사장님 강력 추천</div><img src="'+BAJIRAK+'">'+
        '<div class="winlabel"><div class="kr">'+WIN.kr+'</div><div class="en">'+WIN.en+' · ₩'+WIN.pr+'</div></div></div>'+
      '<div class="win-bd">'+
        '<div class="win-desc">서해 바지락을 아침마다 들여와 끓인 시원한 국물 — 면은 매일 손으로 뽑아요. 외국인이 가장 안전하게 즐기는 "입문 칼국수"예요.</div>'+
        '<div class="win-meta"><span class="m rank">👑 현지인 1위</span><span class="m spice">🌶️ 안 매워요</span><span class="m disc">💸 공기밥 무료</span></div>'+
        '<div class="pron"><button class="pbtn" onclick="speak(\'바지락칼국수 주세요\')">🔊</button><div class="pt"><b>"바지락칼국수 주세요!"</b><span>ba-ji-rak kal-guk-su ju-se-yo</span></div></div>'+
        '<div class="owner"><div class="face">👨‍🍳</div><div class="ot"><b>사장님 한마디</b><p>"우리집 와서 이거 안 먹으면 섭섭하지~ 바지락 국물이 끝내줘요 😤"</p></div></div>'+
      '</div>';
    stage.appendChild(w);down();
    clearAct();
    btn('🍽 이거 주문하기','pri',orderIt);
    var row=document.createElement('div');row.className='row';act.appendChild(row);
    var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='🎰 다른 거 먹을래';b2.onclick=function(){me('다른 것도 볼래!');botSeq(['ㅋㅋ 운명은 정해졌지만~ 다른 메뉴도 다 번역돼 있어. 그래도 사장님 픽은 바지락이야 😉'],function(){clearAct();btn('🍽 역시 바지락칼국수','pri',orderIt);btn('↻ 처음부터','ghost',start);});};row.appendChild(b2);
  });
}
function orderIt(){
  me('🍽 주문할게요!');speak('바지락칼국수 주세요');
  botSeq(['사장님한테 "바지락칼국수 주세요"라고 들려줬어 🔊 곧 나올거야!','먹고 나서 사진 한 장 남기면 미션 끝 📸'],function(){
    showReward();
  });
}

/* STEP 5 — reward */
function showReward(){
  setProg(4);setState('미션 완료! 🍜');
  var r=document.createElement('div');r.className='reward';
  r.innerHTML='<div class="tp">🏆</div><div class="bd"><h4>을지로 노포 정복 배지 획득!</h4><p>+110 포인트 · 다음 방문 시 막걸리 1병 무료 🍶</p></div>';
  stage.appendChild(r);down();clearAct();
  btn('📲 공유하고 친구 초대','gold',function(){me('공유했어! 📲');this.disabled=true;botSeq(['고마워! 친구가 들어오면 둘 다 보너스 🎁 다음 노포도 정복하러 갈까?']);});
  var row=document.createElement('div');row.className='row';act.appendChild(row);
  var b1=document.createElement('button');b1.className='btn grn';b1.innerHTML='🗺 다음 노포';b1.onclick=function(){me('다음 골목으로!');botSeq(['좋아, 을지로 노가리 골목으로 안내할게 🍺']);};row.appendChild(b1);
  var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='↻ 다시';b2.onclick=start;row.appendChild(b2);
}

/* confetti */
function fireConfetti(){
  var colors=['#FF8A3D','#F5C84A','#E0524B','#34D399','#5BB0E8'];
  for(var i=0;i<40;i++){
    (function(){
      var c=document.createElement('div');c.className='confetti';
      c.style.left=(Math.random()*100)+'%';
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.transform='rotate('+(Math.random()*360)+'deg)';
      document.body.appendChild(c);
      var dur=1400+Math.random()*1200,fall=window.innerHeight+40,drift=(Math.random()-.5)*180;
      var st=null;
      function f(ts){if(!st)st=ts;var p=(ts-st)/dur;if(p>=1){c.remove();return;}c.style.top=(p*fall-10)+'px';c.style.marginLeft=(drift*p)+'px';c.style.opacity=(1-p);requestAnimationFrame(f);}
      requestAnimationFrame(f);
    })();
  }
}

start();
</script>
