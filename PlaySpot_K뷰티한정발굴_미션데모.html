<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E0F14">
<title>PlaySpot · K-뷰티 한국한정 발굴 미션 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&family=Black+Han+Sans&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#120E14;--bg1:rgba(255,255,255,.06);--bg2:rgba(255,255,255,.1);
  --accent:#FF5C9D;--accent2:#FF8FC0;--gold:#F5C84A;--mint:#3EC8B0;--green:#34D399;--blue:#5BB0E8;--purple:#B388FF;
  --txt1:#F4ECF2;--txt2:#BCAEC0;--txt3:#7C7184;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
}
body{font-family:'Outfit','Noto Sans KR',-apple-system,system-ui,sans-serif;background:#1a1419;color:var(--txt1);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg0);position:relative;display:flex;flex-direction:column;overflow:hidden;background-image:radial-gradient(circle at 50% 0%,rgba(255,92,157,.12),transparent 55%)}
.hd{flex-shrink:0;padding:14px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(18,14,20,.92);backdrop-filter:blur(12px);z-index:10}
.hd-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.hd-av .pl{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--accent);opacity:0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.hd-who b{font-size:14px;font-weight:800;display:block;line-height:1.2}
.hd-who span{font-size:11px;color:var(--txt3)}
.hd-prog{margin-left:auto;display:flex;gap:4px}
.hd-prog i{width:7px;height:7px;border-radius:50%;background:var(--bg2)}.hd-prog i.on{background:var(--accent)}
.stage{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sys{align-self:center;font-size:11px;color:var(--txt3);background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600}
.bot{max-width:86%;align-self:flex-start;opacity:0;transform:translateY(8px);animation:fade .35s ease forwards}
.bot .b{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:12px 16px;font-size:15px;line-height:1.55;font-weight:500}
.me{max-width:86%;align-self:flex-end;opacity:0;transform:translateY(8px);animation:fade .3s ease forwards}
.me .b{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border-radius:18px;border-bottom-right-radius:5px;padding:11px 16px;font-size:14px;font-weight:700}
@keyframes fade{to{opacity:1;transform:translateY(0)}}
.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:13px 17px;display:inline-flex;gap:5px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.goal{align-self:stretch;background:linear-gradient(135deg,rgba(255,92,157,.16),rgba(179,136,255,.1));border:1px solid rgba(255,92,157,.35);border-radius:18px;padding:15px 16px;opacity:0;transform:translateY(8px);animation:fade .4s ease forwards}
.goal .tg{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--accent2);margin-bottom:6px}
.goal b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.goal p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* signboard scan */
.scan{align-self:stretch;border-radius:20px;overflow:hidden;position:relative;background:#0a080a;border:1px solid var(--border2);opacity:0;animation:fade .4s ease forwards}
.scan .topbar{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;gap:7px;background:linear-gradient(rgba(0,0,0,.6),transparent);z-index:5}
.scan .topbar .dot{width:8px;height:8px;border-radius:50%;background:#FF5252}
.scan .topbar span{font-size:11px;font-weight:700;color:#fff}
.shelf-wrap{position:relative}
.shelf-wrap img{width:100%;display:block}
.scanline{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);box-shadow:0 0 14px 3px rgba(255,92,157,.6);z-index:4;top:0;display:none}
.scanline.run{display:block;animation:scanmove 2.2s ease-in-out}
@keyframes scanmove{0%{top:5%}100%{top:95%}}
.scan-result{position:absolute;left:0;right:0;bottom:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.9));z-index:4;opacity:0;transition:.4s}
.scan-result.show{opacity:1}
.scan-result .ck{font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px}
.scan-result .lock{font-size:13px;font-weight:800;color:var(--accent2)}
/* skin type picker */
.skins{display:grid;grid-template-columns:1fr 1fr;gap:9px;align-self:stretch}
.skin{border-radius:14px;padding:14px 12px;cursor:pointer;border:2px solid var(--border);background:var(--bg1);transition:.15s;text-align:center}
.skin:active{transform:scale(.97)}.skin.sel{border-color:var(--accent)}
.skin .em{font-size:26px;margin-bottom:6px}
.skin b{font-size:13.5px;font-weight:800;display:block}
.skin span{font-size:10.5px;color:var(--txt3)}
/* product card */
.prod{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--border2);background:var(--bg1);opacity:0;animation:popin .5s cubic-bezier(.16,1.3,.3,1) forwards}
@keyframes popin{0%{opacity:0;transform:translateY(14px) scale(.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
.prod-top{display:flex;gap:13px;padding:14px}
.prod-img{width:78px;height:78px;border-radius:14px;flex-shrink:0;background:linear-gradient(135deg,#2a2230,#1a141c);display:flex;align-items:center;justify-content:center;font-size:34px;border:1px solid var(--border)}
.prod-info{flex:1;min-width:0}
.prod-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.prod-badges .b{font-size:9px;font-weight:800;padding:3px 7px;border-radius:10px}
.b.kr{background:linear-gradient(135deg,#d6336c,#a61e4d);color:#fff}
.b.fit{background:rgba(62,200,176,.18);color:var(--mint);border:1px solid rgba(62,200,176,.35)}
.b.rank{background:rgba(245,200,74,.15);color:var(--gold);border:1px solid rgba(245,200,74,.3)}
.prod-name{font-size:14px;font-weight:800;line-height:1.3;margin-bottom:2px}
.prod-en{font-size:11px;color:var(--txt3);font-weight:600;margin-bottom:7px}
.prod-why{font-size:11.5px;color:var(--txt2);line-height:1.5}
.prod-price{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--border);background:rgba(255,255,255,.02)}
.prod-price .kr-price{font-size:17px;font-weight:800;color:var(--accent2)}
.prod-price .home-price{font-size:11px;color:var(--txt3);text-decoration:line-through}
.prod-price .save{margin-left:auto;font-size:10.5px;font-weight:800;color:var(--green);background:rgba(52,211,153,.15);padding:4px 9px;border-radius:20px;border:1px solid rgba(52,211,153,.3)}
.prod-loc{display:flex;align-items:center;gap:7px;padding:9px 14px;border-top:1px solid var(--border);font-size:11.5px;color:var(--txt2);font-weight:600}
.prod-loc .pin{color:var(--accent)}
/* pass */
.pass{align-self:stretch;border-radius:18px;overflow:hidden;border:2px solid var(--accent);background:linear-gradient(135deg,rgba(255,92,157,.16),rgba(179,136,255,.06));opacity:0;animation:fade .5s ease forwards;text-align:center;padding:18px 16px;position:relative}
.pass::before,.pass::after{content:'';position:absolute;top:50%;width:18px;height:18px;border-radius:50%;background:var(--bg0);transform:translateY(-50%)}
.pass::before{left:-9px}.pass::after{right:-9px}
.pass .pl{font-size:11px;font-weight:800;color:var(--accent2);letter-spacing:.05em;margin-bottom:8px}
.pass .pm{font-size:15px;font-weight:800;margin-bottom:6px}
.pass .pd{font-size:12px;color:var(--txt2);line-height:1.5}
.pass .show-staff{margin-top:11px;font-size:11px;font-weight:700;color:var(--accent);border-top:1px dashed rgba(255,92,157,.3);padding-top:10px}
.pron{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:11px;margin-top:12px}
.pron .pbtn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pron .pt b{font-size:13px;font-weight:800;display:block}.pron .pt span{font-size:11px;color:var(--txt3)}
.act{flex-shrink:0;padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;flex-direction:column;gap:9px;background:rgba(18,14,20,.92);backdrop-filter:blur(12px)}
.btn{width:100%;border:none;border-radius:15px;font-family:inherit;font-size:15px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.pri{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff}
.btn.grn{background:linear-gradient(135deg,var(--green),#22b88a);color:#04241c}
.btn.gold{background:linear-gradient(135deg,var(--gold),#e0b43c);color:#2a2200}
.btn.ghost{background:var(--bg2);color:var(--txt1);border:1px solid var(--border2);font-weight:700;font-size:13.5px;padding:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px}.row .btn{flex:1}
.cap{font-size:11px;color:var(--txt3);text-align:center;font-weight:600}
.reward{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--gold);opacity:0;animation:fade .5s ease forwards}
.reward .tp{height:70px;display:flex;align-items:center;justify-content:center;font-size:34px;background:linear-gradient(135deg,rgba(245,200,74,.2),rgba(255,92,157,.06))}
.reward .bd{background:var(--bg1);padding:13px 16px;text-align:center}
.reward .bd h4{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:4px}
.reward .bd p{font-size:12.5px;color:var(--txt2);line-height:1.5}
.confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:99;pointer-events:none}
</style>
</head>
<body>
<div class="phone">
  <div class="hd">
    <div class="hd-av"><span class="pl"></span>💄</div>
    <div class="hd-who"><b>소라 · 가이드</b><span id="hd-state">올리브영 명동 · 도착</span></div>
    <div class="hd-prog" id="hd-prog"><i class="on"></i><i></i><i></i><i></i><i></i></div>
  </div>
  <div class="stage" id="stage"></div>
  <div class="act" id="act"></div>
</div>

    var g=document.createElement('div');g.className='goal';
    g.innerHTML='<div class="tg">💄 시그니처 미션 · 한국한정 발굴</div><b>매장 간판을 스캔하세요</b><p>너에게 맞는 + 한국에서만 파는 + 본국보다 싼 한정템을 찾아줄게. 직구하면 2배인 그것 😏</p>';
    stage.appendChild(g);down();
    clearAct();btn('📷 매장 스캔하기','pri',scan);
  });
}

/* STEP 2 — scan store */
function scan(){
  stage.innerHTML='';clearAct();setProg(2);setState('매장 스캔 중…');
  sys('📷 매장 인식');
  var box=document.createElement('div');box.className='scan';
  box.innerHTML='<div class="topbar"><span class="dot"></span><span>SCAN · 매장 인식 중</span></div>'+
    '<div class="scanline" id="scanline"></div>'+
    '<div class="shelf-wrap"><img src="'+SHELF+'"></div>'+
    '<div class="scan-result" id="scanres"><div class="ck">✓ 올리브영 명동 · 어워즈 진열대 확인</div><div class="lock">💎 한국 한정템 다수 감지됨…</div></div>';
  stage.appendChild(box);down();clearAct();cap('매장을 인식하고 있어요…');
  setTimeout(function(){document.getElementById('scanline').classList.add('run');},300);
  setTimeout(function(){document.getElementById('scanres').classList.add('show');down();},2300);
  setTimeout(function(){
    me('📷 스캔 완료!');
    botSeq(['좋아! 근데 한정템도 네 피부에 맞아야겠지? 🧴 피부 고민 하나만 골라줘 — 딱 맞는 걸로 추려줄게'],pickSkin);
  },2800);
}

/* STEP 3 — skin concern pick */
function pickSkin(){
  setProg(3);setState('피부 고민 선택');
  var wrap=document.createElement('div');wrap.className='skins';
  var opts=[
    {id:'dry',em:'💧',name:'건조함',sub:'당기고 푸석'},
    {id:'oily',em:'🌿',name:'유분·모공',sub:'번들거림'},
    {id:'sensitive',em:'🍃',name:'민감·트러블',sub:'쉽게 붉어짐'},
    {id:'bright',em:'✨',name:'톤·미백',sub:'칙칙함'}
  ];
  opts.forEach(function(o){
    var el=document.createElement('div');el.className='skin';
    el.innerHTML='<div class="em">'+o.em+'</div><b>'+o.name+'</b><span>'+o.sub+'</span>';
    el.onclick=function(){SKIN=o.id;me(o.name+' 고민이야');recommend();};
    wrap.appendChild(el);
  });
  stage.appendChild(wrap);down();clearAct();cap('피부 고민을 골라주세요');
}

/* STEP 4 — recommendations */
function recommend(){
  setProg(4);setState('한정템 추천 💎');
  var list=PRODUCTS[SKIN]||PRODUCTS.dry;
  botSeq(['찾았다! 💎 네 피부에 맞으면서 <b style="color:var(--accent2)">한국에서만</b> 파는, 게다가 본국보다 훨씬 싼 한정템이야 👇'],function(){
    list.forEach(function(p,idx){
      setTimeout(function(){
        var card=document.createElement('div');card.className='prod';
        card.innerHTML=''+
          '<div class="prod-top"><div class="prod-img">'+p.em+'</div><div class="prod-info">'+
            '<div class="prod-badges"><span class="b kr">🇰🇷 한국에서만</span><span class="b fit">💧 내 피부 맞춤</span><span class="b rank">🏆 '+p.rank+'</span></div>'+
            '<div class="prod-name">'+p.kr+'</div><div class="prod-en">'+p.en+'</div>'+
            '<div class="prod-why">'+p.why+'</div>'+
          '</div></div>'+
          '<div class="prod-price"><span class="kr-price">₩'+p.krw+'</span><span class="home-price">본국 '+p.home+'</span><span class="save">💸 '+p.save+'</span></div>'+
          '<div class="prod-loc"><span class="pin">📍</span>'+p.loc+' · "이거 어디 있어요?" 물어보세요</div>';
        stage.appendChild(card);down();
        if(idx===list.length-1){
          setTimeout(function(){
            botSeq(['이거 들고 직원한테 보여주면 바로 찾아줘 😉 살 거면 패스 줄게!'],function(){
              clearAct();btn('🛍 살래요 — 매장 패스 받기','pri',visit);
              var row=document.createElement('div');row.className='row';act.appendChild(row);
              var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='💾 위시리스트 저장';b2.onclick=function(){me('일단 저장!');botSeq(['저장했어 💾 고민되면 나중에 다시 봐도 돼. 근데 한정템이라 품절되면 못 구해 😢']);};row.appendChild(b2);
            });
          },500);
        }
      },idx*450);
    });
  });
}

/* STEP 5 — store pass + reward */
function visit(){
  setProg(5);setState('매장 패스 발급');
  me('🛍 살게요!');
  botSeq(['좋아! 매장에서 이 화면 보여주면 직원이 바로 찾아주고 혜택도 적용돼 👇'],function(){
    var p=document.createElement('div');p.className='pass';
    p.innerHTML='<div class="pl">🎫 PLAYSPOT K-뷰티 패스</div><div class="pm">올리브영 명동 · 한국한정 추천</div><div class="pd">내 피부 맞춤 한정템 · PlaySpot 혜택 적용<br>직구가 대비 최대 55% 저렴</div>'+
      '<div class="pron"><button class="pbtn" onclick="speak(\'이 제품 어디 있어요?\')">🔊</button><div class="pt"><b>"이 제품 어디 있어요?"</b><span>i je-pum eo-di iss-eo-yo?</span></div></div>'+
      '<div class="show-staff">📲 계산 시 직원에게 이 화면을 보여주세요</div>';
    stage.appendChild(p);down();
    setTimeout(function(){
      botSeq(['득템하면 인증샷 한 장이면 미션 완료야 📸'],showReward);
    },1100);
  });
}
function showReward(){
  setState('미션 완료! 💄');fireConfetti();
  var r=document.createElement('div');r.className='reward';
  r.innerHTML='<div class="tp">🏆</div><div class="bd"><h4>K-뷰티 헌터 배지 획득!</h4><p>+120 포인트 · 한국 한정템을 알아본 진짜 고수 💎</p></div>';
  stage.appendChild(r);down();clearAct();
  btn('📲 득템 인증하고 공유','gold',function(){me('인증샷! 📲');this.disabled=true;botSeq(['"한국 한정 하울" 자랑하면 친구들 직구 주소 물어볼걸? 😏 친구 초대하면 둘 다 보너스 🎁']);});
  var row=document.createElement('div');row.className='row';act.appendChild(row);
  var b1=document.createElement('button');b1.className='btn grn';b1.innerHTML='🗺 다른 뷰티 매장';b1.onclick=function(){me('다른 곳도!');botSeq(['명동엔 브랜드 플래그십이 잔뜩이야 💄 가는 곳마다 한정템이 달라. 안내할게 🗺️']);};row.appendChild(b1);
  var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='↻ 다시';b2.onclick=start;row.appendChild(b2);
}

/* confetti */
function fireConfetti(){
  var colors=['#FF5C9D','#B388FF','#F5C84A','#3EC8B0','#5BB0E8'];
  for(var i=0;i<40;i++){(function(){var c=document.createElement('div');c.className='confetti';c.style.left=(Math.random()*100)+'%';c.style.background=colors[Math.floor(Math.random()*colors.length)];c.style.transform='rotate('+(Math.random()*360)+'deg)';document.body.appendChild(c);var dur=1400+Math.random()*1200,fall=window.innerHeight+40,drift=(Math.random()-.5)*180,st=null;function f(ts){if(!st)st=ts;var p=(ts-st)/dur;if(p>=1){c.remove();return;}c.style.top=(p*fall-10)+'px';c.style.marginLeft=(drift*p)+'px';c.style.opacity=(1-p);requestAnimationFrame(f);}requestAnimationFrame(f);})();}
}

start();
</script>
</body>
</html>
