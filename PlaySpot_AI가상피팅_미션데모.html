<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0E0F14">
<title>PlaySpot · AI 가상피팅 미션 데모</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#0E0F14;--bg1:rgba(255,255,255,.06);--bg2:rgba(255,255,255,.1);
  --accent:#FF8A3D;--accent2:#FFB877;--gold:#E8C063;--rose:#FF6B9D;--green:#34D399;--blue:#5BB0E8;--purple:#B388FF;
  --txt1:#F7F4EF;--txt2:#AAB0C0;--txt3:#6B7283;--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
}
body{font-family:'Outfit','Noto Sans KR',-apple-system,system-ui,sans-serif;background:#1a1b22;color:var(--txt1);display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:420px;min-height:100vh;background:var(--bg0);position:relative;display:flex;flex-direction:column;overflow:hidden}
.hd{flex-shrink:0;padding:14px 18px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:rgba(14,15,20,.9);backdrop-filter:blur(12px);z-index:10}
.hd-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--rose));display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;position:relative}
.hd-av .pl{position:absolute;inset:-3px;border-radius:50%;border:2px solid var(--rose);opacity:0;animation:pulse 1.8s ease-out infinite}
@keyframes pulse{0%{opacity:.6;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}
.hd-who b{font-size:14px;font-weight:800;display:block;line-height:1.2}
.hd-who span{font-size:11px;color:var(--txt3)}
.hd-prog{margin-left:auto;display:flex;gap:4px}
.hd-prog i{width:7px;height:7px;border-radius:50%;background:var(--bg2)}
.hd-prog i.on{background:var(--rose)}
.stage{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.sys{align-self:center;font-size:11px;color:var(--txt3);background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600}
.bot{max-width:86%;align-self:flex-start;opacity:0;transform:translateY(8px);animation:fade .35s ease forwards}
.bot .b{background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:12px 16px;font-size:15px;line-height:1.55;font-weight:500}
.me{max-width:86%;align-self:flex-end;opacity:0;transform:translateY(8px);animation:fade .3s ease forwards}
.me .b{background:linear-gradient(135deg,var(--purple),var(--rose));color:#1c0c1f;border-radius:18px;border-bottom-right-radius:5px;padding:11px 16px;font-size:14px;font-weight:700}
@keyframes fade{to{opacity:1;transform:translateY(0)}}
.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:5px;padding:13px 17px;display:inline-flex;gap:5px}
.typing i{width:7px;height:7px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.goal{align-self:stretch;background:linear-gradient(135deg,rgba(179,136,255,.16),rgba(255,107,157,.08));border:1px solid rgba(179,136,255,.35);border-radius:18px;padding:15px 16px;opacity:0;transform:translateY(8px);animation:fade .4s ease forwards}
.goal .tg{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--purple);margin-bottom:6px}
.goal b{font-size:17px;font-weight:800;display:block;margin-bottom:4px}
.goal p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* reference shots */
.refrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-self:stretch;opacity:0;animation:fade .4s ease forwards}
.refshot{border-radius:14px;overflow:hidden;border:1px solid var(--border2);background:#1c1e26;position:relative}
.refshot{aspect-ratio:3/4}
.refshot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:50% 22%;display:block}
.refshot.body img{object-fit:contain;background:#15161c;object-position:50% 50%}
.refshot .tag{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;font-size:11px;font-weight:700;background:linear-gradient(transparent,rgba(0,0,0,.78));color:#fff}
.refshot .ok{position:absolute;top:8px;right:8px;background:var(--green);color:#04241c;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px}
/* camera */
.cam{align-self:stretch;border-radius:22px;overflow:hidden;position:relative;background:#000;aspect-ratio:1;border:1px solid var(--border2);opacity:0;animation:fade .4s ease forwards}
.cam .scene{width:100%;height:100%;display:block}
.cam img.scene{object-fit:contain;background:radial-gradient(circle at 50% 40%,#3a3d49,#1a1c23)}
.cam .frame{position:absolute;inset:14px;border:2px solid rgba(255,255,255,.45);border-radius:14px;pointer-events:none}
.cam .topbar{position:absolute;top:0;left:0;right:0;padding:11px 15px;display:flex;align-items:center;gap:8px;background:linear-gradient(rgba(0,0,0,.55),transparent);z-index:2}
.cam .topbar .dot{width:8px;height:8px;border-radius:50%;background:#FF5252}
.cam .topbar span{font-size:11px;font-weight:700;color:#fff}
.cam .pose{position:absolute;left:12px;right:12px;bottom:14px;text-align:center;font-size:12.5px;color:#fff;font-weight:700;text-shadow:0 1px 8px rgba(0,0,0,.8);z-index:2}
.cam .count{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:90px;font-weight:800;color:#fff;text-shadow:0 4px 24px rgba(0,0,0,.6);z-index:3;font-family:'Outfit'}
.cam .tagm{position:absolute;top:11px;right:14px;background:rgba(179,136,255,.95);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;z-index:3}
.cam.flash::after{content:'';position:absolute;inset:0;background:#fff;animation:fl .5s ease;z-index:5}
@keyframes fl{0%{opacity:.95}100%{opacity:0}}
/* processing */
.proc{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:20px;padding:18px;opacity:0;animation:fade .4s ease forwards}
.proc-hd{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.proc-spin{width:38px;height:38px;border-radius:50%;border:3px solid var(--bg2);border-top-color:var(--rose);animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-hd b{font-size:14px;font-weight:800;display:block}.proc-hd span{font-size:11.5px;color:var(--txt3)}
.proc-bar{height:6px;background:var(--bg2);border-radius:4px;overflow:hidden}
.proc-bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--purple),var(--rose));border-radius:4px;transition:width .5s ease}
.proc-ref{display:flex;gap:7px;margin-top:13px}
.proc-ref div{flex:1;font-size:9.5px;color:var(--txt2);background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:6px;text-align:center;font-weight:600}
/* lookbook result */
.lookbook{align-self:center;width:232px;border-radius:16px;overflow:hidden;background:linear-gradient(165deg,#23252e,#16171d);border:1px solid var(--border2);box-shadow:0 18px 48px rgba(0,0,0,.55);opacity:0;animation:fade .5s ease forwards}
.lookbook .lk-top{display:flex;justify-content:space-between;align-items:center;padding:11px 14px 9px}
.lookbook .lk-top .br{font-size:10px;font-weight:800;letter-spacing:.12em;color:var(--accent2)}
.lookbook .lk-top .st{font-size:9.5px;font-weight:700;color:var(--txt3)}
.lookbook .lk-fig{background:radial-gradient(circle at 50% 28%,#3b3e4a 0%,#1f212a 75%)}
.lookbook .lk-fig svg{width:100%;display:block}
.lookbook .lk-fig img{width:100%;display:block}
.lookbook .lk-meta{padding:11px 14px 13px}
.lookbook .lk-meta b{font-size:13.5px;font-weight:800;display:block;line-height:1.25}
.lookbook .lk-meta span{font-size:10.5px;color:var(--txt3)}
/* collection */
.coll{align-self:stretch;background:var(--bg1);border:1px solid var(--border2);border-radius:18px;padding:16px;opacity:0;animation:fade .5s ease forwards}
.coll-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.coll-hd b{font-size:14px;font-weight:800}
.coll-hd span{font-size:12px;color:var(--accent2);font-weight:700}
.coll-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.coll-cell{aspect-ratio:.8;border-radius:9px;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:var(--bg2);font-size:9px;color:var(--txt3);font-weight:700;text-align:center;padding:4px;position:relative;overflow:hidden}
.coll-cell.got{border-color:var(--rose)}
.coll-cell .ic{font-size:17px}
.coll-cell.locked .ic{filter:grayscale(1);opacity:.4}
.coll-cell .new{position:absolute;top:3px;right:3px;background:var(--rose);color:#fff;font-size:7px;font-weight:800;padding:1px 4px;border-radius:8px}
/* reward */
.reward{align-self:stretch;border-radius:18px;overflow:hidden;border:1px solid var(--gold);opacity:0;animation:fade .5s ease forwards}
.reward .tp{height:74px;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,rgba(232,192,99,.2),rgba(179,136,255,.08))}
.reward .bd{background:var(--bg1);padding:13px 16px;text-align:center}
.reward .bd h4{font-size:15px;font-weight:800;color:var(--gold);margin-bottom:4px}
.reward .bd p{font-size:12.5px;color:var(--txt2);line-height:1.5}
/* action bar */
.act{flex-shrink:0;padding:14px 18px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;flex-direction:column;gap:9px;background:rgba(14,15,20,.9);backdrop-filter:blur(12px)}
.btn{width:100%;border:none;border-radius:15px;font-family:inherit;font-size:15px;font-weight:800;padding:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.pri{background:linear-gradient(135deg,var(--purple),var(--rose));color:#1c0c1f}
.btn.grn{background:linear-gradient(135deg,var(--green),#22b88a);color:#04241c}
.btn.gold{background:linear-gradient(135deg,var(--gold),#d4a93c);color:#2a2200}
.btn.ghost{background:var(--bg2);color:var(--txt1);border:1px solid var(--border2);font-weight:700;font-size:13.5px;padding:12px}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:9px}.row .btn{flex:1}
.cap{font-size:11px;color:var(--txt3);text-align:center;font-weight:600}
</style>
</head>

/* ---------- chat plumbing (shared with 네컷 demo) ---------- */
var stage=document.getElementById('stage'),act=document.getElementById('act');
function setState(t){document.getElementById('hd-state').textContent=t;}
function setProg(n){document.querySelectorAll('#hd-prog i').forEach(function(x,i){x.classList.toggle('on',i<n);});}
function down(){stage.scrollTop=stage.scrollHeight;}
function sys(t){var d=document.createElement('div');d.className='sys';d.textContent=t;stage.appendChild(d);down();}
function me(t){var d=document.createElement('div');d.className='me';d.innerHTML='<div class="b">'+t+'</div>';stage.appendChild(d);down();}
function clearAct(){act.innerHTML='';}
function btn(html,cls,fn){var b=document.createElement('button');b.className='btn '+(cls||'');b.innerHTML=html;b.onclick=fn;act.appendChild(b);return b;}
function cap(t){var p=document.createElement('div');p.className='cap';p.textContent=t;act.appendChild(p);return p;}
function botSeq(msgs,cb){var i=0;(function step(){if(i>=msgs.length){if(cb)cb();return;}var tp=document.createElement('div');tp.className='typing';tp.innerHTML='<i></i><i></i><i></i>';stage.appendChild(tp);down();var delay=Math.min(900,400+msgs[i].length*22);setTimeout(function(){if(tp.parentNode)stage.removeChild(tp);var d=document.createElement('div');d.className='bot';d.innerHTML='<div class="b">'+msgs[i]+'</div>';stage.appendChild(d);down();i++;setTimeout(step,250);},delay);})();}

/* ---------- STEP 1 · brief ---------- */
function start(){
  stage.innerHTML='';clearAct();setProg(1);setState('성수 편집숍 거리 · 도착');
  sys('📡 도착 감지 · 성수 편집숍 거리');
  botSeq([
    '여긴 옷이 진짜 예쁜데, 여행 와서 다 입어보긴 시간이 없잖아 🥲',
    '오늘 미션은 <b style="color:var(--accent2)">AI 가상피팅</b> — 매장 옷을 <b>입어보지 않고도</b> 네 모습에 입혀서 착장샷을 뽑아줄게 👗'
  ],function(){
    var g=document.createElement('div');g.className='goal';
    g.innerHTML='<div class="tg">🪄 시그니처 미션 · AI 피팅</div><b>안 입어보고 입어본 컷 만들기</b><p>등록해둔 네 전신·얼굴 레퍼런스에, 매장에서 고른 옷을 AI가 합성해줘. 셀피 영상·스폿컷처럼 — 이번엔 AI가 널 직접 입혀주는 미션이야.</p>';
    stage.appendChild(g);down();
    clearAct();
    btn('🪄 피팅 시작하기','pri',confirmRefs);
  });
}

/* ---------- STEP 2 · reference check ---------- */
function confirmRefs(){
  stage.innerHTML='';clearAct();setProg(2);setState('레퍼런스 확인');
  sys('🪪 내 피팅 레퍼런스');
  botSeq(['먼저 너로 입혀야 하니까 — 투어 시작할 때 등록해둔 레퍼런스 2장 불러올게.'],function(){
    var row=document.createElement('div');row.className='refrow';
    row.innerHTML=
      '<div class="refshot body"><span class="ok">✓ 등록됨</span><img src="'+IMG_BODY+'"><div class="tag">전신 · T자 레퍼런스</div></div>'+
      '<div class="refshot"><span class="ok">✓ 등록됨</span><img src="'+IMG_FACE+'"><div class="tag">얼굴 레퍼런스</div></div>';
    stage.appendChild(row);down();
    setTimeout(function(){
      botSeq(['이 2장이 "너"의 기준이야. 체형은 전신에서, 얼굴은 셀피에서 가져와서 — 어떤 옷을 입혀도 늘 네 모습으로 일관되게 나와 😎','이제 매장에서 마음에 든 옷만 찍으면 끝!'],function(){
        clearAct();
        btn('📷 매장 의류 촬영하기','pri',shoot);
        var b2=document.createElement('button');b2.className='btn ghost';b2.innerHTML='↻ 레퍼런스 다시 등록';b2.onclick=function(){me('레퍼런스 다시 등록할래');botSeq(['좋아 — 밝은 곳에서 ① 팔 살짝 벌린 전신 T자, ② 얼굴 정면 셀피 2장만 다시 찍으면 갱신돼. (데모에선 등록된 상태로 진행할게)']);};act.appendChild(b2);
      });
    },700);
  });
}

/* ---------- STEP 3 · shoot the garment ---------- */
function shoot(){
  stage.innerHTML='';clearAct();setProg(3);setState('매장 의류 촬영 중…');
  sys('📷 매장 의류 촬영');
  botSeq(['옷을 <b>정면에서, 가능하면 펼치거나 행거째</b> 담아줘 — 깔끔하게 찍을수록 피팅이 자연스러워.'],function(){
    var cam=document.createElement('div');cam.className='cam';cam.id='cam';
    cam.innerHTML='<div class="topbar"><span class="dot"></span><span>LIVE · 의류 스캔</span></div>'+
      '<div class="tagm" id="tagm">SCAN</div>'+
      '<div id="camslot"><img class="scene" src="'+IMG_GARMENT+'"></div>'+
      '<div class="frame"></div>'+
      '<div class="pose" id="pose">'+ITEM.name+' · '+ITEM.store+'</div>'+
      '<div class="count" id="count" style="display:none"></div>';
    stage.appendChild(cam);down();
    clearAct();
    var sb=btn('📷 이 옷 촬영','pri',function(){doShoot(sb);});sb.id='shootbtn';
    cap('마음에 든 옷을 카메라에 담고 촬영을 누르세요');
  });
}
function doShoot(b){
  b.disabled=true;
  var cam=document.getElementById('cam');
  var c=document.getElementById('count');c.style.display='flex';
  var n=3;c.textContent=n;
  var iv=setInterval(function(){
    n--;
    if(n>0){c.textContent=n;}
    else{
      clearInterval(iv);c.style.display='none';
      cam.classList.add('flash');
      setTimeout(function(){cam.classList.remove('flash');},500);
      document.getElementById('tagm').textContent='✓ 스캔 완료';
      clearAct();
      setTimeout(function(){me('이 옷으로! 📷');composite();},650);
    }
  },650);
}

/* ---------- composite ---------- */
function composite(){
  botSeq(['좋아 — 네 레퍼런스에 이 옷 입히는 중… 🪄'],function(){
    var card=document.createElement('div');card.className='proc';
    card.innerHTML='<div class="proc-hd"><div class="proc-spin"></div><div><b>AI 착장 합성 중…</b><span>'+ITEM.name+'</span></div></div>'+
      '<div class="proc-bar"><i id="pbar"></i></div>'+
      '<div class="proc-ref"><div>🧍 전신 레퍼런스</div><div>🙂 얼굴 레퍼런스</div><div>👕 선택 의류</div></div>';
    stage.appendChild(card);down();
    var bar=document.getElementById('pbar');var p=0;
    var iv=setInterval(function(){p+=25;bar.style.width=p+'%';if(p>=100){clearInterval(iv);setTimeout(showResult,500);}},450);
  });
}

/* ---------- STEP 4 · result ---------- */
function showResult(){
  stage.innerHTML='';clearAct();setProg(4);setState('완성! 🪄');
  var g=ITEM;
  sys('🪄 착장샷 완성');
  botSeq(['짠 — 안 입어보고 입어본 컷 완성! 🎉'],function(){
    var lb=document.createElement('div');lb.className='lookbook';
    lb.innerHTML='<div class="lk-top"><span class="br">PLAYSPOT · FIT</span><span class="st">'+g.store+'</span></div>'+
      '<div class="lk-fig"><img src="'+IMG_LOOK+'"></div>'+
      '<div class="lk-meta"><b>'+g.name+'</b><span>AI 가상피팅 · 성수 컬렉션</span></div>';
    stage.appendChild(lb);down();
    setTimeout(function(){
      botSeq(['마음에 들면 바로 공유 — 한국에서 이 옷 입은 인증샷처럼 ✨'],function(){
        var coll=document.createElement('div');coll.className='coll';
        coll.innerHTML='<div class="coll-hd"><b>🗂 AI 시그니처 미션</b><span>3 / 5 수집</span></div>';
        var grid=document.createElement('div');grid.className='coll-grid';
        var cells=[
          {n:'AI 피팅',ic:'👗',got:true,nw:true},{n:'스폿컷',ic:'📸',got:true},{n:'셀피영상',ic:'🎬',got:true},
          {n:'조선변신',ic:'👘',got:false},{n:'미공개',ic:'✨',got:false}
        ];
        cells.forEach(function(c){
          var el=document.createElement('div');el.className='coll-cell '+(c.got?'got':'locked');
          el.innerHTML=(c.nw?'<span class="new">NEW</span>':'')+'<span class="ic">'+c.ic+'</span>'+c.n+(c.got?'':'<div style="font-size:8px">🔒</div>');
          grid.appendChild(el);
        });
        coll.appendChild(grid);stage.appendChild(coll);down();
        setTimeout(function(){
          var r=document.createElement('div');r.className='reward';
          r.innerHTML='<div class="tp">🏆</div><div class="bd"><h4>성수 AI 피팅 획득!</h4><p>+150 포인트 · 5개 미션 다 모으면 한정 굿즈 🎁</p></div>';
          stage.appendChild(r);down();
          clearAct();
          btn('📲 착장샷 공유하기','gold',function(){me('공유했어! 📲');this.disabled=true;botSeq(['전송 완료! 네 착장샷이 피드에 떴어 🎉 성수 쇼핑 인증 완료!']);});
          btn('↻ 처음부터','ghost',start);
        },700);
      });
    },1000);
  });
}

start();
</script>
</body>
</html>
